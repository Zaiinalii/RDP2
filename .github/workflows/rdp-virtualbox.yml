                });
                
                    if (prices.length >= 1) data.basic_price = prices[0];
                    if (prices.length >= 2) data.standard_price = prices[1];
                    if (prices.length >= 3) data.premium_price = prices[2];
                    
                    // Extract delivery times
                    const deliveryEls = document.querySelectorAll('[class*="delivery"]');
                    const deliveryTimes = [];
                    deliveryEls.forEach(el => {
                        if (!el || !el.innerText) return;
                        const text = (el.innerText || '').trim();
                        if (text.match(/\\d+\\s*(day|hour)/i)) {
                            deliveryTimes.push(text);
                        }
                    });
                    if (deliveryTimes.length >= 1) data.basic_delivery_days = deliveryTimes[0];
                    if (deliveryTimes.length >= 2) data.standard_delivery_days = deliveryTimes[1];
                    if (deliveryTimes.length >= 3) data.premium_delivery_days = deliveryTimes[2];
                    
                    // Package names (Basic, Standard, Premium or custom names)
                    const packageHeaders = document.querySelectorAll('[class*="package-title"], [class*="tier-name"]');
                    if (packageHeaders.length >= 1) data.basic_name = packageHeaders[0]?.innerText.trim() || 'Basic';
                    if (packageHeaders.length >= 2) data.standard_name = packageHeaders[1]?.innerText.trim() || 'Standard';
                    if (packageHeaders.length >= 3) data.premium_name = packageHeaders[2]?.innerText.trim() || 'Premium';
                } // End of pricing DOM fallback
                
                // ==========================================
                // REVIEWS - DOM FALLBACK (only if no data from JSON)
                // ==========================================
                
                // Rating breakdown (5-star, 4-star, etc.) - DOM fallback
                if (data.reviews_breakdown.five_star === 0) {
                    // Try the stars-counters table first (most reliable for breakdown)
                    const starsTable = document.querySelector('.stars-counters, table.stars-counters');
                    if (starsTable) {
                        const rows = starsTable.querySelectorAll('tr');
                        rows.forEach(row => {
                            const text = row.innerText || '';
                            const countMatch = text.match(/\\((\\d[\\d,]*)\\)/);
                            const count = countMatch ? parseInt(countMatch[1].replace(/,/g, '')) : 0;
                            
                            if (text.includes('5 Star')) data.reviews_breakdown.five_star = count;
                            else if (text.includes('4 Star')) data.reviews_breakdown.four_star = count;
                            else if (text.includes('3 Star')) data.reviews_breakdown.three_star = count;
                            else if (text.includes('2 Star')) data.reviews_breakdown.two_star = count;
                            else if (text.includes('1 Star')) data.reviews_breakdown.one_star = count;
                        });
                    }
                    
                    // Fallback to other selectors
                    if (data.reviews_breakdown.five_star === 0) {
                        const breakdownEls = document.querySelectorAll('[class*="breakdown"] [class*="bar"], [class*="rating-breakdown"] tr');
                        breakdownEls.forEach(el => {
                            const text = el.innerText;
                            const countMatch = text.match(/(\\d+)/);
                            if (countMatch) {
                                const count = parseInt(countMatch[1]);
                                if (text.includes('5')) data.reviews_breakdown.five_star = count;
                                else if (text.includes('4')) data.reviews_breakdown.four_star = count;
                                else if (text.includes('3')) data.reviews_breakdown.three_star = count;
                                else if (text.includes('2') && !text.includes('12')) data.reviews_breakdown.two_star = count;
                                else if (text.includes('1') && !text.includes('10') && !text.includes('11')) data.reviews_breakdown.one_star = count;
                            }
                        });
                    }
                }
                
                // Extract individual reviews - DOM fallback (only if no reviews from JSON)
                if (!data.recent_reviews || data.recent_reviews.length === 0) {
                    const reviewItems = document.querySelectorAll(
                        '[class*="review-item"], [class*="review-container"], ' +
                        '[class*="carousel-review-item"], [data-testid*="review"]'
                    );
                    
                    const reviews = [];
                    reviewItems.forEach((item, index) => {
                        if (index >= 10) return; // Max 10 reviews
                        
                        const review = {
                            buyer_name: '',
                            buyer_country: '',
                            review_rating: '',
                            review_text: '',
                            review_date: '',
                            order_price: '',
                            order_duration: '',
                            is_repeat_client: false,
                            seller_response: ''
                        };
                        
                        // Buyer name - look for username text
                        const nameEl = item.querySelector('h6, p[data-track-tag="text"], [class*="username"], figcaption + p');
                        if (nameEl && nameEl.innerText) {
                            const name = (nameEl.innerText || '').trim();
                            if (name && name.length < 50 && !name.includes('Seller')) {
                                review.buyer_name = name;
                            }
                        }
                    
                    // Buyer country - look for flag + country text
                    const countryEl = item.querySelector('.country p, [class*="country"] p, img[class*="flag"] + p');
                    if (countryEl && countryEl.innerText) review.buyer_country = (countryEl.innerText || '').trim();
                    
                    // Is repeat client?
                    const repeatText = item.innerText || '';
                    if (repeatText.toLowerCase().includes('repeat client')) {
                        review.is_repeat_client = true;
                    }
                    
                    // Rating - find rating-score element
                    const ratingEl = item.querySelector('.rating-score, [class*="rating-score"], strong[class*="rating"]');
                    if (ratingEl && ratingEl.innerText) {
                        const match = (ratingEl.innerText || '').match(/[0-5](\\.\\d)?/);
                        if (match) review.review_rating = match[0];
                    }
                    
                    // Review text - find the review description
                    const textEl = item.querySelector('.review-description p, [class*="review-description"] p, .reliable-review-description p');
                    if (textEl && textEl.innerText) {
                        let text = (textEl.innerText || '').trim();
                        // Remove "See more" text
                        text = text.replace(/See more$/i, '').trim();
                        review.review_text = text.substring(0, 1000);
                    }
                    
                        // Review date - find time element
                        const dateEl = item.querySelector('time, [class*="date"]');
                        if (dateEl && dateEl.innerText) review.review_date = (dateEl.innerText || '').trim();
                        
                        // Order price range - look for price text
                        const priceEls = item.querySelectorAll('p[data-track-tag="text"]');
                        priceEls.forEach(el => {
                            const text = el.innerText || '';
                            if (text.includes('$')) {
                                review.order_price = text.trim();
                            }
                        });
                        
                        // Order duration - look for duration text like "7 days", "4 weeks"
                        const allTexts = item.querySelectorAll('p[data-track-tag="text"]');
                        allTexts.forEach(el => {
                            const text = el.innerText || '';
                            if (text.match(/\\d+\\s*(day|week|month)/i)) {
                                review.order_duration = text.trim();
                            }
                        });
                        
                        // Seller response - check for seller comment section
                        const sellerResponseEl = item.querySelector('[class*="seller_comment"] .review-description p, article .review-description p');
                        if (sellerResponseEl && sellerResponseEl.innerText) {
                            review.seller_response = (sellerResponseEl.innerText || '').substring(0, 500).trim();
                        }
                        
                        if (review.buyer_name || review.review_text) {
                            reviews.push(review);
                        }
                    });
                    data.recent_reviews = reviews;
                } // End of reviews DOM fallback
                
                // ==========================================
                // FAQ - DOM FALLBACK (only if not from JSON)
                // ==========================================
                if (!data.faq_items || data.faq_items.length === 0) {
                    const faqItems = document.querySelectorAll('[class*="faq-collapsible"], [class*="faq"] [class*="question"], [class*="faq-item"]');
                    const faqs = [];
                    faqItems.forEach((item, index) => {
                        if (index >= 10) return;
                        const q = item.querySelector('[class*="title"], [class*="question"], summary, button')?.innerText.trim();
                        const a = item.querySelector('[class*="content"], [class*="answer"], p')?.innerText.trim();
                        if (q) faqs.push({ question: q.substring(0, 200), answer: (a || '').substring(0, 500) });
                    });
                    data.faq_items = faqs;
                }
                
                // ==========================================
                // ADDITIONAL INFO (always check DOM for these)
                // ==========================================
                
                // Has video (add to existing if found)
                if (!data.has_video) {
                    data.has_video = !!document.querySelector('video, [class*="video"], [class*="player"]');
                }
                
                // Gallery images count (only if not from JSON)
                if (!data.gallery_images_count) {
                    data.gallery_images_count = document.querySelectorAll('[class*="gallery"] img, [class*="carousel"] img').length;
                }
                
                // Video consultation
                const consultText = document.body.innerText.toLowerCase();
                data.offers_video_consultation = consultText.includes('video consultation') || consultText.includes('zoom call');
                
                return data;
            }
        ''')
        
        # Add metadata
        gig_data['url'] = gig_url
        gig_data['gig_id'] = gig_data.get('gig_id') or gig_id
        gig_data['scraped_at'] = datetime.now().isoformat()
        gig_data['ip_address'] = SESSION_IP or 'Unknown'
        gig_data['scrape_country'] = SESSION_COUNTRY or 'Unknown'
        
        # Helper to safely convert list items to strings
        def safe_join(items, sep=', '):
            """Join list items, converting dicts to strings if needed."""
            if not items:
                return ''
            result = []
            for item in items:
                if isinstance(item, dict):
                    # For skill dicts like {name: "X", level: "Y"}, extract name
                    result.append(item.get('name', item.get('label', str(item))))
                elif isinstance(item, str):
                    result.append(item)
                else:
                    result.append(str(item))
            return sep.join(result)
        
        # Convert lists to strings for CSV compatibility
        if isinstance(gig_data.get('gig_tags'), list):
            gig_data['gig_tags'] = safe_join(gig_data['gig_tags'])
        if isinstance(gig_data.get('basic_features'), list):
            gig_data['basic_features'] = safe_join(gig_data['basic_features'])
        if isinstance(gig_data.get('standard_features'), list):
            gig_data['standard_features'] = safe_join(gig_data['standard_features'])
        if isinstance(gig_data.get('premium_features'), list):
            gig_data['premium_features'] = safe_join(gig_data['premium_features'])
        if isinstance(gig_data.get('seller_skills'), list):
            gig_data['seller_skills'] = safe_join(gig_data['seller_skills'])
        if isinstance(gig_data.get('notable_clients'), list):
            gig_data['notable_clients_json'] = json.dumps(gig_data['notable_clients'], ensure_ascii=False)
        
        # Also store certifications and education as JSON
        if isinstance(gig_data.get('seller_certifications'), list):
            gig_data['seller_certifications_json'] = json.dumps(gig_data['seller_certifications'], ensure_ascii=False)
        if isinstance(gig_data.get('seller_education'), list):
            gig_data['seller_education_json'] = json.dumps(gig_data['seller_education'], ensure_ascii=False)
        
        # Convert reviews breakdown dict to individual fields
        if isinstance(gig_data.get('reviews_breakdown'), dict):
            rb = gig_data['reviews_breakdown']
            gig_data['five_star_count'] = rb.get('five_star', 0)
            gig_data['four_star_count'] = rb.get('four_star', 0)
            gig_data['three_star_count'] = rb.get('three_star', 0)
            gig_data['two_star_count'] = rb.get('two_star', 0)
            gig_data['one_star_count'] = rb.get('one_star', 0)
            gig_data['seller_communication_rating'] = rb.get('seller_communication', 0)
            gig_data['quality_of_delivery_rating'] = rb.get('quality_of_delivery', 0)
            gig_data['value_of_delivery_rating'] = rb.get('value_of_delivery', 0)
        
        # Convert recent_reviews to JSON string for storage
        if isinstance(gig_data.get('recent_reviews'), list):
            gig_data['recent_reviews_json'] = json.dumps(gig_data['recent_reviews'], ensure_ascii=False)
            gig_data['reviews_scraped_count'] = len(gig_data['recent_reviews'])
        
        # Convert FAQ to JSON string
        if isinstance(gig_data.get('faq_items'), list):
            gig_data['faq_json'] = json.dumps(gig_data['faq_items'], ensure_ascii=False)
            gig_data['faq_count'] = len(gig_data['faq_items'])
        
        return gig_data
        
    except Exception as e:
        log(f"   ⚠️ Error scraping gig: {e}")
        return None

def save_gig_details_to_fgos(gig_data):
    """Save individual gig details to FGOS."""
    if not gig_data:
        return False
    
    gig_id = str(gig_data.get('gig_id', 'unknown'))
    ok = fgos_ingest_gig_details([gig_data])
    
    if ok:
        log(f"      💾 Sent to FGOS: {gig_id[:40]}...")
        save_scraped_gig_id(gig_id)
    else:
        log(f"      ❌ Failed to send to FGOS!")
    
    return ok

def save_gig_details_batch(gig_list):
    """Save batch of gig details to FGOS."""
    if not gig_list:
        return False
    
    ok = fgos_ingest_gig_details(gig_list)
    
    if ok:
        log(f"✅ Sent batch of {len(gig_list)} gig details to FGOS")
        # Mark each gig as done
        for gig_data in gig_list:
            gig_id = str(gig_data.get('gig_id', ''))
            if gig_id:
                save_scraped_gig_id(gig_id)
    
    return ok

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 2: ONE BROWSER, MULTIPLE TABS (SAFE & EFFICIENT!)
# ═══════════════════════════════════════════════════════════════════════════════

# Thread-safe lock for SCRAPED_GIGS set
SCRAPED_GIGS_LOCK = _threading.Lock()

async def tab_worker(tab_id: int, page, gig_queue: asyncio.Queue, results: list, results_lock: asyncio.Lock, stop_signal: dict, failed_gigs: dict):
    """
    Tab worker that pulls gigs from shared queue.
    When tab finishes one gig, it grabs the next available from queue.
    If stop_signal is set, puts current gig back and stops.
    Tracks failed gigs to avoid infinite retry loops.
    """
    tab_name = f"📑 Tab-{tab_id}"
    gigs_done = 0
    current_gig = None  # Track current gig so we can put it back if needed
    
    while True:
        # Check stop signal
        if stop_signal.get('stop'):
            break
            
        try:
            # Get next gig from queue (non-blocking check)
            current_gig = gig_queue.get_nowait()
            gig_index, gig_url = current_gig
        except asyncio.QueueEmpty:
            # No more gigs in this batch
            current_gig = None
            break
        
        if CONTROL['quit']:
            # Put gig back if quitting
            await gig_queue.put(current_gig)
            current_gig = None
            break
        
        gig_id = get_gig_id_from_url(gig_url)
        
        # Skip if already scraped
        with SCRAPED_GIGS_LOCK:
            if gig_id in SCRAPED_GIGS:
                current_gig = None
                continue
        
        # Check if this gig failed too many times (prevent infinite loop)
        fail_count = failed_gigs.get(gig_id, 0)
        if fail_count >= 3:
            log(f"{tab_name} ⏭️ #{gig_index} failed 3x, skipping")
            with SCRAPED_GIGS_LOCK:
                SCRAPED_GIGS.add(str(gig_id))  # Mark as done to avoid re-claiming
            current_gig = None
            continue
        
        try:
            gig_data = await scrape_gig_details(page, gig_url)
            
            # Check stop signal after scrape (another tab may have hit CAPTCHA)
            if stop_signal.get('stop'):
                # Put gig back - we don't know if scrape was clean
                await gig_queue.put(current_gig)
                current_gig = None
                break
            
            # CAPTCHA check
            if await detect_captcha(page):
                log(f"{tab_name} 🛑 CAPTCHA at #{gig_index}!")
                # Signal ALL tabs to stop
                stop_signal['stop'] = True
                # Put gig back in queue
                await gig_queue.put(current_gig)
                current_gig = None
                return 'captcha'
            
            # Success! Mark as scraped
            with SCRAPED_GIGS_LOCK:
                SCRAPED_GIGS.add(str(gig_id))
            
            if gig_data and gig_data.get('gig_title'):
                async with results_lock:
                    results.append(gig_data)
                title = gig_data.get('gig_title', '')[:20]
                log(f"{tab_name} ✅ #{gig_index} {title}...")
                gigs_done += 1
            else:
                log(f"{tab_name} ⚠️ #{gig_index} No data")
            
            current_gig = None  # Successfully processed
            
        except Exception as e:
            log(f"{tab_name} ❌ #{gig_index} {str(e)[:25]}")
            # Track failure count
            failed_gigs[gig_id] = fail_count + 1
            # Put gig back on error - don't lose it!
            if current_gig:
                await gig_queue.put(current_gig)
                current_gig = None
        
        # Small delay
        await asyncio.sleep(random.uniform(0.5, 1.0))
    
    return gigs_done


async def run_phase2(page=None, browser=None, context=None):
    """
    Phase 2: ONE BROWSER, MULTIPLE TABS - WORK QUEUE MODE (FGOS-driven)
    
    How it works:
    1. Browser claims gigs from FGOS → puts in QUEUE
    2. All tabs grab from queue (whoever is free takes next)
    3. If CAPTCHA: reset browser, continue with remaining gigs
    4. When batch done → send to FGOS → claim next batch
    
    NO gigs lost! CAPTCHA just means reset and continue.
    """
    
    BATCH_SIZE = 3
    MAX_CAPTCHA_RESETS = 5
    
    log("\n" + "="*70)
    log("🚀 PHASE 2: ONE BROWSER, MULTIPLE TABS (FGOS QUEUE)")
    log("="*70)
    log(f"📑 Tabs: {NUM_BROWSERS} tabs pulling from shared queue")
    log(f"📦 Batch: {BATCH_SIZE} gigs per claim cycle")
    log(f"⚡ Mode: Tabs grab next gig when free")
    log(f"🛡️  CAPTCHA: Reset browser, continue remaining gigs")
    log("="*70)
    
    send_heartbeat("PHASE2_STARTED", f"1 browser, {NUM_BROWSERS} tabs, FGOS queue mode")
    
    # Close original browser
    if browser:
        log("🔒 Closing original browser...")
        try:
            await browser.__aexit__(None, None, None)
        except:
            pass
    
    load_scraped_gigs_list()
    
    # Main loop
    total_scraped = 0
    max_session = 2000
    total_captcha_resets = 0
    start_time = asyncio.get_event_loop().time()
    
    # Current browser/tabs (will be created/recreated)
    lightweight_browser = None
    pages = []
    
    while total_scraped < max_session and not CONTROL['quit']:
        # ═══════════════════════════════════════════════════════════════
        # CLAIM batch of gigs from FGOS
        # ═══════════════════════════════════════════════════════════════
        claimed = []
        for _ in range(BATCH_SIZE):
            gig_id, gig_url = fgos_claim_gig()
            if gig_url is None:
                break
            claimed.append((gig_id, gig_url))
        
        if not claimed:
            log("✅ All gigs claimed from FGOS!")
            break
        
        log(f"\n📦 BATCH: {len(claimed)} gigs from FGOS")
        
        # Put all gigs in QUEUE
        gig_queue = asyncio.Queue()
        for idx, gig in enumerate(claimed):
            await gig_queue.put((idx, gig[1]))  # (index, url)
        
        # Results for this batch
        batch_results = []
        results_lock = asyncio.Lock()
        batch_captcha_resets = 0
        failed_gigs = {}
        batch_failed = False
        
        # ═══════════════════════════════════════════════════════════════
        # SCRAPE until queue is EMPTY
        # ═══════════════════════════════════════════════════════════════
        while not gig_queue.empty() and not CONTROL['quit']:
            
            # Create browser if needed
            if lightweight_browser is None:
                log(f"🖥️ Creating browser...")
                lightweight_browser, first_page = await create_lightweight_browser(1)
                
                if not lightweight_browser:
                    log("❌ Failed to create browser!")
                    batch_failed = True
                    break
                
                # Create tabs
                browser_context = first_page.context
                pages = [first_page]
                
                for i in range(NUM_BROWSERS - 1):
                    try:
                        new_page = await browser_context.new_page()
                        pages.append(new_page)
                    except:
                        pass
                
                log(f"✅ {len(pages)} tabs ready")
                
                # Warmup
                for pg in pages:
                    try:
                        await pg.goto("https://www.fiverr.com", timeout=30000)
                        await dismiss_popups(pg)
                    except:
                        pass
            
            remaining = gig_queue.qsize()
            log(f"📋 Queue: {remaining} gigs remaining")
            
            stop_signal = {'stop': False}
            
            tasks = [
                tab_worker(i+1, pages[i], gig_queue, batch_results, results_lock, stop_signal, failed_gigs)
                for i in range(len(pages))
            ]
            
            results = await asyncio.gather(*tasks, return_exceptions=True)
            
            if 'captcha' in results:
                batch_captcha_resets += 1
                total_captcha_resets += 1
                remaining_in_queue = gig_queue.qsize()
                
                log(f"🛑 CAPTCHA! Reset #{batch_captcha_resets}. {remaining_in_queue} gigs still in queue...")
                
                if batch_captcha_resets > MAX_CAPTCHA_RESETS:
                    log(f"❌ Too many CAPTCHAs ({batch_captcha_resets}), skipping remaining...")
                    batch_failed = True
                    break
                
                if lightweight_browser:
                    try:
                        await lightweight_browser.__aexit__(None, None, None)
                    except:
                        pass
                    lightweight_browser = None
                    pages = []
                
                log(f"🔄 Will create new browser and continue with {remaining_in_queue} gigs...")
                await asyncio.sleep(2)
                continue
            
            break
        
        # ═══════════════════════════════════════════════════════════════
        # SAVE BATCH RESULTS TO FGOS
        # ═══════════════════════════════════════════════════════════════
        if batch_results:
            log(f"💾 Batch complete! Saving {len(batch_results)} gigs to FGOS...")
            save_gig_details_batch(batch_results)
            total_scraped += len(batch_results)
        
        log(f"📊 Total: {total_scraped} gigs | Resets: {total_captcha_resets}")
        send_heartbeat("PHASE2_PROGRESS", f"{total_scraped} gigs, {total_captcha_resets} resets")
        
        await asyncio.sleep(random.uniform(1, 2))
    
    # Cleanup
    if lightweight_browser:
        log("\n🔒 Closing browser...")
        try:
            await lightweight_browser.__aexit__(None, None, None)
        except:
            pass
    
    elapsed = asyncio.get_event_loop().time() - start_time
    
    log(f"\n" + "="*70)
    log(f"✅ PHASE 2 COMPLETE!")
    log(f"="*70)
    log(f"   📊 Scraped: {total_scraped} gigs")
    log(f"   🔄 CAPTCHA resets: {total_captcha_resets}")
    log(f"   ⏱️  Time: {elapsed/60:.1f} min")
    if elapsed > 0:
        log(f"   ⚡ Speed: {total_scraped/(elapsed/60):.1f} gigs/min")
    log(f"="*70)
    
    send_heartbeat("PHASE2_COMPLETED", f"{total_scraped} gigs, {total_captcha_resets} resets")
    
    return []

# ═══════════════════════════════════════════════════════════════════════════════
# MAIN
# ═══════════════════════════════════════════════════════════════════════════════

async def main():
    print("""
    ╔═══════════════════════════════════════════════════════════════════════════╗
    ║           FIVERR SCRAPER - Phase 1 & Phase 2 Combined (FGOS)             ║
    ╠═══════════════════════════════════════════════════════════════════════════╣
    ║  Phase 1: Search keywords → Extract gig URLs from search results         ║
    ║  Phase 2: Visit each gig → Extract detailed seller info                  ║
    ╠═══════════════════════════════════════════════════════════════════════════╣
    ║  Mode:     Fully automated (no keyboard controls)                         ║
    ║  Backend:  FGOS Fleet API                                                 ║
    ╚═══════════════════════════════════════════════════════════════════════════╝
    """)
    
    # Start keyboard listener for interactive controls
    start_keyboard_listener()
    
    # ⚡ Register with FGOS and start heartbeat thread
    send_startup_heartbeat()
    
    log(f"🚀 Session ID: {SESSION_TIMESTAMP}")
    log(f"   VM ID: {VM_ID}")
    log(f"   FGOS Session: {FGOS_SESSION_ID}")
    log(f"   FGOS API: {FGOS_API_URL}")
    log(f"   🕐 UTC Time: {UTC_NOW.strftime('%Y-%m-%d %H:%M:%S')} UTC")
    log(f"   📁 Time Period: {SESSION_PERIOD} (data goes to {DATA_FOLDER}/)")
    
    # Setup VPN with random location + get IP info
    setup_vpn()
    
    # Load keywords from FGOS
    keywords = load_keywords_from_fgos()
    log(f"\n📋 Keywords to scrape ({len(keywords)}):")
    for i, kw in enumerate(keywords, 1):
        log(f"   {i}. {kw}")
    
    # Create browser
    camoufox = None
    page = None
    all_results = {}
    phase2_results = []
    
    try:
        camoufox, page = await create_browser()
        log("✅ Browser ready")
        
        # ═══════════════════════════════════════════════════════════════════════
        # PHASE 1: KEYWORD SCRAPING (FGOS Distributed)
        # ═══════════════════════════════════════════════════════════════════════
        
        if not CONTROL['skip_to_phase2']:
            log("\n" + "="*70)
            log("📋 PHASE 1: KEYWORD SCRAPING (FGOS Distributed)")
            log("="*70)
            
            send_heartbeat("PHASE1_STARTED", f"Starting keyword scraping ({len(keywords)} keywords)")
            
            # Scrape keywords using FGOS atomic claiming
            keywords_scraped_this_session = 0
            
            while not CONTROL['skip_to_phase2'] and not CONTROL['quit']:
                # Check controls
                ctrl = await check_controls()
                if ctrl == False:  # Quit
                    log("🛑 Quit requested, stopping")
                    break
                if ctrl == 'skip':
                    continue
                if CONTROL['skip_to_phase2']:
                    log("⏭️ Skipping to Phase 2...")
                    break
                
                # Claim next keyword from FGOS
                kw_index, keyword, claim_err = fgos_claim_keyword()
                
                if keyword is None and claim_err:
                    # API error — retry up to 3 times with delay
                    claim_retries = 3
                    for retry in range(1, claim_retries + 1):
                        log(f"   🔄 Retrying claim in 10s... ({retry}/{claim_retries})")
                        await asyncio.sleep(10)
                        kw_index, keyword, claim_err = fgos_claim_keyword()
                        if keyword is not None or claim_err is None:
                            break
                    if keyword is None and claim_err:
                        log("❌ Claim-keyword failed after retries, stopping Phase 1")
                        break
                
                if keyword is None:
                    log("✅ All keywords claimed! Phase 1 complete.")
                    break
                
                keywords_scraped_this_session += 1
                
                log(f"\n{'='*70}")
                log(f"📌 KEYWORD #{kw_index}: '{keyword}' (session: {keywords_scraped_this_session})")
                log(f"{'='*70}")
                
                # Retry keyword up to 2 times on navigation/browser errors
                max_kw_retries = 2
                kw_success = False
                for kw_attempt in range(1, max_kw_retries + 1):
                    try:
                        if kw_attempt > 1:
                            log(f"🔄 Retrying keyword '{keyword}' (attempt {kw_attempt}/{max_kw_retries})")
                            await asyncio.sleep(5)
                        
                        gigs = await scrape_keyword_all_pages(page, keyword)
                        
                        if gigs:
                            all_results[keyword] = gigs
                            
                            # Save this keyword's results immediately to FGOS
                            save_keyword_results(keyword, gigs)
                            fgos_keyword_done(keyword, len(gigs), MAX_PAGES, gigs)
                        else:
                            fgos_keyword_done(keyword, 0, 0)
                        
                        kw_success = True
                        break
                        
                    except Exception as e:
                        err_str = str(e)
                        log(f"❌ Error scraping '{keyword}' (attempt {kw_attempt}): {err_str[:100]}")
                        # Only retry on navigation/network errors
                        if kw_attempt < max_kw_retries and any(x in err_str for x in 
                            ['NS_BINDING_ABORTED', 'NS_ERROR', 'Timeout', 'timeout', 'ERR_', 'ECONNRESET']):
                            continue
                        else:
                            fgos_keyword_failed(keyword, e)
                            break
                
                # Delay between keywords
                if not CONTROL['skip_to_phase2']:
                    delay = random.uniform(5, 10)
                    log(f"\n⏳ Waiting {delay:.1f}s before next keyword...")
                    await asyncio.sleep(delay)
            
            # Phase 1 summary
            if all_results and not CONTROL['quit']:
                log(f"\n{'='*70}")
                log("📊 PHASE 1 SUMMARY")
                log(f"{'='*70}")
                save_session_summary(all_results)
                
                total_gigs = sum(len(g) for g in all_results.values())
                log(f"✅ Phase 1 complete: {len(all_results)} keywords, {total_gigs} gigs")
                send_heartbeat("PHASE1_COMPLETED", f"Done! {len(all_results)} keywords, {total_gigs} gigs")
        else:
            log("⏭️ Phase 1 skipped (jumping to Phase 2)")
        
        # ═══════════════════════════════════════════════════════════════════════
        # PHASE 2: ONE BROWSER, MULTIPLE TABS (FGOS-driven)
        # ═══════════════════════════════════════════════════════════════════════
        
        if not CONTROL['quit'] and not CONTROL['phase1_only']:
            log("\n" + "="*70)
            log(f"🚀 Starting Phase 2: ONE browser with {NUM_BROWSERS} TABS in 5 seconds...")
            log("   ⚡ Mode: Lightweight (no images/CSS/fonts)")
            log("   📑 All tabs share ONE browser = safer, less memory")
            log("   🌐 Gig claiming via FGOS fleet API")
            log("   Press [Q] to quit, [P] to pause")
            log("="*70)
            await asyncio.sleep(5)
            
            if not CONTROL['quit']:
                phase2_results = await run_phase2(page, browser=camoufox)
                camoufox = None  # Phase 2 already closed it
        
        # ═══════════════════════════════════════════════════════════════════════
        # FINAL SUMMARY
        # ═══════════════════════════════════════════════════════════════════════
        
        total_gigs = sum(len(g) for g in all_results.values()) if all_results else 0
        log(f"\n{'='*70}")
        log("✅ ALL PHASES COMPLETE!")
        log(f"{'='*70}")
        log(f"   Phase 1: {len(all_results)} keywords → {total_gigs} gig URLs")
        log(f"   Phase 2: {len(phase2_results)} gig details scraped")
        log(f"   Session ID: {SESSION_TIMESTAMP}")
        log(f"   📁 Data folder: {DATA_FOLDER}/")
        log(f"   🕐 Time Period: {SESSION_PERIOD} (UTC)")
        
    except Exception as e:
        error_msg = f"Fatal error: {e}"
        log(f"❌ {error_msg}")
        import traceback
        traceback.print_exc()
        send_error_heartbeat(error_msg)
    
    finally:
        if camoufox:
            log("\n🔒 Closing browser...")
            try:
                await camoufox.__aexit__(None, None, None)
            except:
                pass
        
        # Flush remaining logs to FGOS
        log("\n📋 Flushing logs to FGOS...")
        flush_logs_to_fgos()
        log("✅ Logs flushed to FGOS")
        
        # Send completion heartbeat
        total_gigs = sum(len(g) for g in all_results.values()) if all_results else 0
        send_complete_heartbeat(f"Done! P1:{len(all_results)} keywords/{total_gigs} URLs, P2:{len(phase2_results)} details")
        
        log("👋 Done!")

if __name__ == "__main__":
    # Command line arguments for quick access
    import argparse
    parser = argparse.ArgumentParser(description='Fiverr Scraper - Phase 1 & 2')
    parser.add_argument('--phase2', '-2', action='store_true', help='Skip Phase 1, jump to Phase 2')
    parser.add_argument('--phase1', '-1', action='store_true', help='Run Phase 1 only (no Phase 2)')
    args = parser.parse_args()
    
    if args.phase2:
        CONTROL['skip_to_phase2'] = True
        print("⏭️ --phase2 flag: Skipping to Phase 2")
    
    if args.phase1:
        CONTROL['phase1_only'] = True
        print("1️⃣ --phase1 flag: Phase 1 only, no Phase 2")
    
    asyncio.run(main())
