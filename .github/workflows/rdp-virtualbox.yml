# POPUP/MODAL HANDLING
# ═══════════════════════════════════════════════════════════════════════════════

async def dismiss_popups(page):
    """Dismiss any visible popups/modals with a single Escape press."""
    try:
        await page.keyboard.press('Escape')
        await asyncio.sleep(0.3)
    except:
        pass
    return True

async def safe_click(page, selector, timeout=5000):
    """Safely click an element, dismissing popups if needed."""
    max_attempts = 3
    
    for attempt in range(max_attempts):
        try:
            element = await page.wait_for_selector(selector, timeout=timeout)
            if element:
                await element.click()
                return True
        except Exception as e:
            error_msg = str(e).lower()
            # If element is covered by another element, dismiss popups and retry
            if 'intercept' in error_msg or 'covered' in error_msg or 'another element' in error_msg:
                log(f"⚠️ Element blocked, dismissing popups (attempt {attempt + 1})")
                await dismiss_popups(page)
                await asyncio.sleep(0.5)
            else:
                break
    
    return False

