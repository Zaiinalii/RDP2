name: Fiverr Scraper (Direct + PIA VPN)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: windows-latest
    timeout-minutes: 360  # 6 hours (GitHub hosted runner max)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── PYTHON SETUP ────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          Write-Host "📦 Installing Python dependencies..."
          pip install --upgrade pip
          pip install playwright requests certifi "camoufox[geoip]" browserforge
          
          Write-Host "🦊 Installing Playwright Firefox..."
          python -m playwright install firefox
          
          Write-Host "🦊 Fetching Camoufox browser..."
          python -m camoufox fetch
          
          Write-Host "✅ All dependencies installed!"

      # ─── PIA VPN SETUP ───────────────────────────────────────────
      - name: Install PIA VPN
        run: |
          Write-Host "🌐 Downloading PIA VPN installer from R2..."
          $piaUrl = "https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/pia-windows-x64-3.7-08412%20(1).exe"
          $piaInstaller = "$env:TEMP\pia-install.exe"
          
          Invoke-WebRequest -Uri $piaUrl -OutFile $piaInstaller -UseBasicParsing
          
          $fileSize = (Get-Item $piaInstaller).Length
          Write-Host "📥 Downloaded: $([math]::Round($fileSize / 1MB, 1)) MB"
          
          if ($fileSize -lt 1000000) {
              Write-Error "❌ Download too small ($fileSize bytes) - likely failed"
              exit 1
          }
          
          # PIA 3.x uses Qt Installer Framework (QtIFW) - try multiple silent approaches
          Write-Host "📦 Attempt 1: QtIFW silent install..."
          $proc = Start-Process -FilePath $piaInstaller -ArgumentList "install","--al","-c" -Wait -PassThru
          Write-Host "   Exit code: $($proc.ExitCode)"
          
          $piactl = "C:\Program Files\Private Internet Access\piactl.exe"
          if (-not (Test-Path $piactl)) {
              Write-Host "📦 Attempt 2: NSIS /S flag..."
              $proc = Start-Process -FilePath $piaInstaller -ArgumentList "/S" -Wait -PassThru
              Write-Host "   Exit code: $($proc.ExitCode)"
          }
          
          if (-not (Test-Path $piactl)) {
              Write-Host "📦 Attempt 3: --silent flag..."
              $proc = Start-Process -FilePath $piaInstaller -ArgumentList "--silent" -Wait -PassThru
              Write-Host "   Exit code: $($proc.ExitCode)"
          }
          
          if (-not (Test-Path $piactl)) {
              Write-Host "📦 Attempt 4: /VERYSILENT /SUPPRESSMSGBOXES (InnoSetup)..."
              $proc = Start-Process -FilePath $piaInstaller -ArgumentList "/VERYSILENT","/SUPPRESSMSGBOXES","/NORESTART" -Wait -PassThru
              Write-Host "   Exit code: $($proc.ExitCode)"
          }
          
          # Wait a bit for services to register
          Start-Sleep -Seconds 15
          
          # Check result
          if (Test-Path $piactl) {
              Write-Host "✅ PIA VPN installed successfully!"
          } else {
              Write-Host "❌ All install attempts failed. Diagnostics:"
              Write-Host ""
              Write-Host "🔍 Searching entire C: for piactl.exe..."
              Get-ChildItem "C:\Program Files" -Recurse -Filter "piactl.exe" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   Found: $($_.FullName)" }
              Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "piactl.exe" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   Found: $($_.FullName)" }
              Write-Host ""
              Write-Host "📂 Program Files folders with PIA/Private:"
              Get-ChildItem "C:\Program Files" | Where-Object { $_.Name -like "*PIA*" -or $_.Name -like "*Private*" -or $_.Name -like "*Internet*" } | ForEach-Object { Write-Host "   $($_.FullName)" }
              Get-ChildItem "C:\Program Files (x86)" | Where-Object { $_.Name -like "*PIA*" -or $_.Name -like "*Private*" -or $_.Name -like "*Internet*" } | ForEach-Object { Write-Host "   $($_.FullName)" }
              Write-Host ""
              Write-Host "📂 Installer TEMP artifacts:"
              Get-ChildItem $env:TEMP -Filter "*pia*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   $($_.FullName)" }
              Get-ChildItem $env:TEMP -Filter "*private*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "   $($_.FullName)" }
              Write-Host ""
              Write-Host "📋 Recent installer logs in TEMP:"
              Get-ChildItem $env:TEMP -Filter "*.log" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 10 | ForEach-Object { Write-Host "   $($_.Name) ($($_.Length) bytes, $($_.LastWriteTime))" }
              Write-Host ""
              Write-Host "📋 Services with PIA/Private:"
              Get-Service | Where-Object { $_.DisplayName -like "*PIA*" -or $_.DisplayName -like "*Private*" } | ForEach-Object { Write-Host "   $($_.Name): $($_.Status)" }
              Write-Host ""
              Write-Host "📋 Installer file info:"
              $sig = Get-AuthenticodeSignature $piaInstaller -ErrorAction SilentlyContinue
              Write-Host "   Signature: $($sig.Status) - $($sig.SignerCertificate.Subject)"
              Write-Error "❌ PIA VPN installation failed after all attempts"
              exit 1
          }

      - name: Login and Connect PIA VPN
        run: |
          $piactl = "C:\Program Files\Private Internet Access\piactl.exe"
          
          # Enable background mode (no GUI needed)
          & $piactl background enable
          Start-Sleep -Seconds 3
          
          # Login using credentials file
          $credsFile = "$env:TEMP\pia-creds.txt"
          "p8158950`nGoYoula@niba12`$2323" | Out-File -FilePath $credsFile -Encoding ascii -NoNewline
          & $piactl login $credsFile
          Remove-Item $credsFile -Force
          Start-Sleep -Seconds 5
          
          # Set a random US location and connect
          $locations = @("us-east", "us-west", "us-california", "us-chicago", "us-texas", "us-florida", "us-atlanta", "us-denver", "us-seattle", "us-new-york-city")
          $location = $locations | Get-Random
          Write-Host "🌐 Connecting to PIA: $location"
          & $piactl set region $location
          & $piactl connect
          
          # Wait for connection (max 30s)
          $connected = $false
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              $state = & $piactl get connectionstate
              Write-Host "   ⏳ State: $state ($($i+1)/15)"
              if ($state -eq "Connected") {
                  $connected = $true
                  break
              }
          }
          
          if ($connected) {
              Write-Host "✅ PIA VPN connected to $location!"
              # Show new IP
              $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing -TimeoutSec 10).Content
              Write-Host "📍 Public IP: $ip"
          } else {
              Write-Host "⚠️ VPN connection slow, Mainbot.py will handle it"
          }

      # ─── RUN THE SCRAPER ─────────────────────────────────────────
      - name: Run Scraper
        env:
          PIA_USERNAME: "p8158950"
          PIA_PASSWORD: "GoYoula@niba12$2323"
          FGOS_API_KEY: "fgos-scraper-key-2026-secure"
        run: |
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  🚀 Starting Fiverr Scraper (FGOS Fleet)"
          Write-Host "=========================================="
          Write-Host "  Mode: Direct on runner + PIA VPN"
          Write-Host "  Backend: FGOS Fleet API"
          Write-Host "=========================================="
          Write-Host ""
          
          python Mainbot.py