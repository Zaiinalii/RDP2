# PAKISTAN TIME - All VMs use Pakistan Standard Time (UTC+5)
# ═══════════════════════════════════════════════════════════════════════════════

def get_pakistan_now():
    """Get current time in Pakistan Standard Time (UTC+5)."""
    from datetime import timedelta
    utc_now = datetime.now(timezone.utc)
    pkt = timezone(timedelta(hours=5))  # Pakistan is UTC+5
    return utc_now.astimezone(pkt)

def get_utc_now():
    """Get current UTC time (kept for compatibility)."""
    return datetime.now(timezone.utc)

def get_time_period():
    """Get current time period based on Pakistan time.
    
    Returns:
        'AM' if Pakistan hour is 0-11 (12:00 AM to 11:59 AM Pakistan)
        'PM' if Pakistan hour is 12-23 (12:00 PM to 11:59 PM Pakistan)
    """
    pk_hour = get_pakistan_now().hour
    return 'AM' if pk_hour < 12 else 'PM'

def get_data_folder_path():
    """Get the data folder path for current session.
    
    Format: scraped_data/{YYYY-MM-DD}/{AM or PM}/
    Uses Pakistan date and time period.
    """
    pk_now = get_pakistan_now()
    date_str = pk_now.strftime('%Y-%m-%d')
    period = get_time_period()
    return f"scraped_data/{date_str}/{period}"

