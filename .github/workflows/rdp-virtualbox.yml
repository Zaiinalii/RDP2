                        }
                        
                        // === FAQ ===
                        if (gigData.faq && gigData.faq.questionsAndAnswers) {
                            data.faq_items = gigData.faq.questionsAndAnswers.map(qa => ({
                                question: qa.question,
                                answer: qa.answer
                            }));
                        }
                        
                        // === TAGS ===
                        if (gigData.tags && gigData.tags.tagsGigList) {
                            data.gig_tags = gigData.tags.tagsGigList.map(t => t.name);
                        }
                        
                        // === GALLERY ===
                        if (gigData.gallery && gigData.gallery.slides) {
                            data.gallery_images_count = gigData.gallery.slides.length;
                            data.has_video = gigData.gallery.slides.some(s => s.slide?.typeVideo);
                        }
                        
                        // === NOTABLE CLIENTS ===
                        if (gigData.notableClients) {
                            data.notable_clients = gigData.notableClients.map(c => ({
                                name: c.name,
                                website: c.website,
                                industry: c.enriched_details?.industry || ''
                            }));
                        }
                        
                        // === DESCRIPTION from gig description ===
                        // Helper function to convert HTML to formatted text (preserves structure)
                        const htmlToText = (html) => {
                            if (!html) return '';
                            const temp = document.createElement('div');
                            temp.innerHTML = html;
                            // Convert <br> to newlines
                            temp.querySelectorAll('br').forEach(br => br.replaceWith('\\n'));
                            // Convert <p> to paragraphs (double newline after)
                            temp.querySelectorAll('p').forEach(p => { p.innerHTML = p.innerHTML + '\\n\\n'; });
                            // Convert <li> to bullet points
                            temp.querySelectorAll('li').forEach(li => { li.innerHTML = '• ' + li.innerHTML + '\\n'; });
                            // Get text and clean up multiple newlines
                            let text = temp.textContent || temp.innerText || '';
                            text = text.replace(/\\n{3,}/g, '\\n\\n');
                            text = text.replace(/&nbsp;/g, ' ');
                            text = text.replace(/&amp;/g, '&');
                            return text.trim();
                        };
                        
                        if (gigData.description && gigData.description.content) {
                            // Save BOTH raw HTML and formatted text versions
                            data.gig_description_html = gigData.description.content;
                            data.gig_description = htmlToText(gigData.description.content).substring(0, 3000);
                        }
                        
                        // === CHOICE ELIGIBILITY ===
                        if (gigData.choiceEligibilities && gigData.choiceEligibilities.length > 0) {
                            data.is_choice_seller = true;
                        }
                        
                        // === TOP NAV - Favorites count ===
                        if (gigData.topNav && gigData.topNav.gigCollectedCount) {
                            data.favorites_count = gigData.topNav.gigCollectedCount;
                        }
                        
                        // === SEO DATA - Price range ===
                        if (gigData.seo && gigData.seo.schemaMarkup && gigData.seo.schemaMarkup.gigOffers) {
                            data.price_range_low = gigData.seo.schemaMarkup.gigOffers.lowPrice;
                            data.price_range_high = gigData.seo.schemaMarkup.gigOffers.highPrice;
                        }
                        
                        // === PORTFOLIO ===
                        if (gigData.portfolio) {
                            data.portfolio_projects_count = gigData.portfolio.projectsCount || 0;
                        }
                        
                        // === SELLER INTRO VIDEO ===
                        if (gigData.seller && gigData.seller.introVideo) {
                            data.seller_intro_video_url = gigData.seller.introVideo.url || '';
                        }
                        
                        // === CONSULTATION DATA ===
                        if (gigData.consultationData) {
                            data.offers_video_consultation = true;
                            data.consultation_description = gigData.consultationData.description || '';
                            if (gigData.consultationData.pricing) {
                                data.consultation_pricing = gigData.consultationData.pricing.map(p => ({
                                    minutes: p.session_minutes,
                                    price: '$' + p.price
                                }));
                            }
                        }
                        
                        // === OTHER GIGS BY SELLER ===
                        if (gigData.otherGigs && gigData.otherGigs.gigIds) {
                            data.seller_other_gig_ids = gigData.otherGigs.gigIds;
                        }
                        
                        // === GALLERY - More details ===
                        if (gigData.gallery && gigData.gallery.slides) {
                            data.gallery_items = gigData.gallery.slides.map(s => ({
                                type: s.slide?.typeVideo ? 'video' : 'image',
                                src: s.slide?.src,
                                is_work_sample: s.slide?.isWorkSample || false
                            }));
                        }
                    }
                } catch (jsonError) {
                    // JSON extraction failed, continue to DOM fallback
                }
                
                // ==========================================
                // METHOD 2: DOM FALLBACK (only fill in missing data)
                // Only extract via DOM if JSON extraction didn't get the value
                // ==========================================
                
                // Username from URL (always reliable)
                if (!data.seller_username) {
                    const urlMatch = window.location.pathname.match(/\\/([a-z0-9_]+)\\//i);
                    if (urlMatch) data.seller_username = urlMatch[1];
                }
                
                // Seller display name - multiple selectors
                if (!data.seller_display_name) {
                    const nameSelectors = [
                        '.seller-card a[href*="/"] b',
                        '[class*="seller-name"]',
                        '.username-line a',
                        '[data-testid="seller-name"]',
                        '.seller-overview a.seller-link'
                    ];
                    for (const sel of nameSelectors) {
                        const el = document.querySelector(sel);
                        if (el && el.innerText.trim()) {
                            data.seller_display_name = el.innerText.trim();
                            break;
                        }
                    }
                }
                
                // Seller level badge (only if not already from JSON)
                if (!data.seller_level) {
                    const levelSelectors = [
                        '[class*="seller-level"]',
                        '[class*="level-badge"]',
                        '.level',
                        '[class*="top-rated"]',
                        '[data-testid*="level"]'
                    ];
                    for (const sel of levelSelectors) {
                        const el = document.querySelector(sel);
                        if (el && el.innerText.trim()) {
                            const text = el.innerText.trim().toLowerCase();
                            if (text.includes('top rated plus') || text.includes('top rated') || 
                                text.includes('level') || text.includes('new seller')) {
                                data.seller_level = el.innerText.trim();
                                break;
                            }
                        }
                    }
                }
                
                // Pro seller / Choice badges (add to existing if found)
                const allBadges = document.querySelectorAll('[class*="badge"], [class*="pro"], [class*="choice"]');
                allBadges.forEach(badge => {
                    try {
                        const text = String(badge.innerText || '').toLowerCase();
                        const className = String(badge.className?.baseVal || badge.className || '').toLowerCase();
                        if (text.includes('pro') || className.includes('pro')) {
                            data.is_pro_seller = true;
                        }
                        if (text.includes('choice') || className.includes('choice')) {
                            data.is_choice_seller = true;
                        }
                    } catch(e) {}
                });
                
                // Rating (only if not from JSON)
                if (!data.seller_rating) {
                    const ratingSelectors = [
                        '[class*="rating"] b',
                        '[class*="rating-score"]',
                        '[data-testid*="rating"]',
                        '.gig-overview b'
                    ];
                    for (const sel of ratingSelectors) {
                        const el = document.querySelector(sel);
                        if (el) {
                            const text = el.innerText.trim();
                            if (/^[0-5](\\.[0-9])?$/.test(text)) {
                                data.seller_rating = text;
                                break;
                            }
                        }
                    }
                }
                
                // Total reviews count
                const reviewCountSelectors = [
                    '[class*="ratings-count"]',
                    '[class*="reviews-count"]',
                    '[href*="#reviews"]',
                    'a[href*="reviews"]'
                ];
                for (const sel of reviewCountSelectors) {
                    const el = document.querySelector(sel);
                    if (el) {
                        const match = el.innerText.match(/([\\d,]+)/);
                        if (match) {
                            data.total_reviews = match[1].replace(/,/g, '');
                            break;
                        }
                    }
                }
                
                // Seller stats - only fill in if not from JSON
                const statElements = document.querySelectorAll(
                    '[class*="seller-stats"] li, .seller-card li, [class*="stat"], ' +
                    '[class*="seller-overview"] li, [class*="user-stats"] li'
                );
                statElements.forEach(li => {
                    if (!li || !li.innerText) return;
                    const text = (li.innerText || '').toLowerCase();
                    const fullText = (li.innerText || '').trim();
                    
                    if (!data.response_time && text.includes('response')) {
                        data.response_time = fullText.replace(/response\\s*(time)?:?/i, '').trim();
                    }
                    if (!data.seller_country && text.includes('from') && (text.includes('country') || text.length < 50)) {
                        data.seller_country = fullText.replace(/from:?/i, '').trim();
                    }
                    if (!data.member_since && (text.includes('member since') || text.includes('joined'))) {
                        data.member_since = fullText.replace(/member since:?|joined:?/i, '').trim();
                    }
                    if (text.includes('last delivery') || text.includes('avg. response')) {
                        data.last_delivery = fullText;
                    }
                    if (!data.orders_in_queue && (text.includes('queue') || text.includes('orders in'))) {
                        const match = fullText.match(/\\d+/);
                        if (match) data.orders_in_queue = match[0];
                    }
                });
                
                // Languages (only if not from JSON)
                if (!data.languages) {
                    const langEl = document.querySelector('[class*="languages"], .languages, [data-testid*="language"]');
                    if (langEl) data.languages = langEl.innerText.trim();
                }
                
                // Seller description (only if not from JSON)
                if (!data.seller_description) {
                    const aboutEl = document.querySelector('[class*="seller-desc"], .seller-description, [class*="about-seller"]');
                    if (aboutEl) data.seller_description = aboutEl.innerText.substring(0, 2000).trim();
                }
                
                // ==========================================
                // GIG INFO - DOM FALLBACK
                // ==========================================
                
                // Gig title (only if not from JSON)
                if (!data.gig_title) {
                    const titleEl = document.querySelector('h1, [class*="gig-title"]');
                    if (titleEl) data.gig_title = titleEl.innerText.trim();
                }
                
                // Gig description (only if not from JSON)
                if (!data.gig_description) {
                    const descEl = document.querySelector(
                        '[class*="description"], .gig-description, ' +
                        '[data-testid*="description"], [class*="gig-overview"]'
                    );
                    if (descEl) data.gig_description = descEl.innerText.trim();
                }
                
                // Category breadcrumb (only if not from JSON)
                if (!data.category_breadcrumb) {
                    const breadcrumbEl = document.querySelector('[class*="breadcrumb"], nav[aria-label*="breadcrumb"]');
                    if (breadcrumbEl) data.category_breadcrumb = breadcrumbEl.innerText.replace(/[\\n\\r]+/g, ' > ').trim();
                }
                
                // Tags (only if not from JSON)
                if (!data.gig_tags || data.gig_tags.length === 0) {
                    const tagEls = document.querySelectorAll(
                        '[class*="gig-tags"] a, [class*="metadata"] a, ' +
                        '.tags a, [href*="/search/gigs?query="]'
                    );
                    data.gig_tags = Array.from(tagEls)
                        .map(t => (t.innerText || '').trim())
                        .filter(t => t && t.length < 50)
