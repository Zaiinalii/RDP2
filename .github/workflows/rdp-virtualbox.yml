async def detect_captcha(page):
    """
    Detect if CAPTCHA is present by checking page title.
    Fiverr shows "Human Test" or similar in tab title when CAPTCHA appears.
    """
    try:
        title = await page.title()
        title_lower = title.lower()
        
        # Check for CAPTCHA indicators in title
        captcha_indicators = [
            'human test',
            'captcha',
            'verify',
            'robot',
            'challenge',
            'security check',
            'blocked',
            'access denied'
        ]
        
        for indicator in captcha_indicators:
            if indicator in title_lower:
                log(f"🛑 CAPTCHA DETECTED! Tab title: '{title}'")
                return True
        
        # Also check page content for common CAPTCHA elements
        captcha_in_page = await page.evaluate('''
            () => {
                const body = document.body ? document.body.innerText.toLowerCase() : '';
                const html = document.documentElement.innerHTML.toLowerCase();
                
                // Check for CAPTCHA iframes or elements
                const hasCaptchaIframe = document.querySelector('iframe[src*="captcha"], iframe[src*="recaptcha"], iframe[src*="hcaptcha"]');
                const hasCaptchaDiv = document.querySelector('[class*="captcha"], [id*="captcha"], [class*="challenge"]');
                
                // Check for blocking messages
                const blockingTexts = ['verify you are human', 'complete the captcha', 'security check', 'prove you are not a robot'];
                const hasBlockingText = blockingTexts.some(t => body.includes(t));
                
                return hasCaptchaIframe || hasCaptchaDiv || hasBlockingText;
            }
        ''')
        
        if captcha_in_page:
            log(f"🛑 CAPTCHA DETECTED in page content!")
            return True
        
        return False
        
    except Exception as e:
        log(f"⚠️ Error checking for CAPTCHA: {e}")
        return False

async def reset_identity(browser):
    """
    Reset identity when CAPTCHA detected:
    1. Close browser (clears fingerprint)
    2. Disconnect VPN
    3. Connect to NEW VPN location (new IP)
    4. Relaunch browser (new fingerprint)
    
    Returns: (new_browser, new_page) or (None, None) on failure
    """
    log("\n" + "="*50)
    log("🔄 IDENTITY RESET - Getting new identity...")
    log("="*50)
    
    # 1. Close browser
    try:
        log("   1️⃣ Closing browser...")
        await browser.__aexit__(None, None, None)
    except Exception as e:
        log(f"   ⚠️ Browser close error (ok): {e}")
    
    # 2. Disconnect VPN
    log("   2️⃣ Disconnecting VPN...")
    pia_disconnect()
    time.sleep(2)
    
    # 3. Connect to new random location
    log("   3️⃣ Connecting to NEW VPN location...")
    old_location = SESSION_VPN_LOCATION
    success = pia_connect_random()
    
    if success:
        time.sleep(3)  # Wait for connection
        get_current_ip_info()
        log(f"   ✅ New location: {SESSION_VPN_LOCATION} (was: {old_location})")
    else:
        log("   ⚠️ VPN reconnect failed, trying anyway...")
    
    # 4. Relaunch browser
    log("   4️⃣ Launching NEW browser (new fingerprint)...")
    try:
        new_browser, new_page = await create_browser()
        
        # Warmup the new browser
        try:
            await new_page.goto("https://www.fiverr.com", timeout=60000)
            await asyncio.sleep(2)
            await dismiss_popups(new_page)
        except:
            pass
        
        log("   ✅ NEW IDENTITY READY!")
        log(f"      IP: {SESSION_IP}")
        log(f"      Location: {SESSION_VPN_LOCATION}")
        log("="*50 + "\n")
        return new_browser, None, new_page
    except Exception as e:
        log(f"   ❌ Browser relaunch failed: {e}")
        return None, None, None

# ═══════════════════════════════════════════════════════════════════════════════
# BROWSER LAUNCH — DEFAULT CAMOUFOX (no overconfig)
# ═══════════════════════════════════════════════════════════════════════════════
# Camoufox handles everything internally via BrowserForge:
#   - Random OS fingerprint (market-share weighted)
#   - Random screen, WebGL, canvas, fonts, UA, hardware concurrency
#   - Built-in uBlock Origin
#   - Human-like cursor movement
#   - Anti-fingerprinting at C++ level
# We just launch it with defaults. Don't over-configure.
# ═══════════════════════════════════════════════════════════════════════════════


async def create_browser():
    """Create default Camoufox browser.
    
    Camoufox auto-generates a complete random identity per launch:
    fingerprint, screen, WebGL, canvas, fonts, UA — all handled internally.
    Always runs visible (headless=False).
    Falls back to no-geoip if geoip extra is missing.
    """
    from camoufox.async_api import AsyncCamoufox
    
    log("🚀 Launching Camoufox browser (visible)...")
    
    # Try with geoip first, fallback without if extra not installed
    try:
        camoufox = await AsyncCamoufox(
            headless=False,
            geoip=True,
        ).__aenter__()
    except Exception as e:
        err = str(e)
        if 'geoip' in err.lower() or 'NotInstalledGeoIPExtra' in err:
            log(f"⚠️ geoip extra not installed, launching without geoip...")
        else:
            log(f"⚠️ Browser launch error: {err[:80]}, retrying without geoip...")
        camoufox = await AsyncCamoufox(
            headless=False,
        ).__aenter__()
    
    page = await camoufox.new_page()
    
    log("✅ Browser ready")
    
    return camoufox, page


async def create_lightweight_browser(browser_id=1):
    """Create lightweight Camoufox browser for Phase 2 — blocks images to save bandwidth."""
    from camoufox.async_api import AsyncCamoufox
    
    log(f"🚀 Launching lightweight browser #{browser_id} (visible)...")
    
    try:
        camoufox = await AsyncCamoufox(
            headless=False,
            geoip=True,
        ).__aenter__()
    except Exception as e:
        err = str(e)
        if 'geoip' in err.lower() or 'NotInstalledGeoIPExtra' in err:
            log(f"⚠️ geoip extra not installed, launching without geoip...")
        else:
            log(f"⚠️ Launch error: {err[:80]}, retrying without geoip...")
        camoufox = await AsyncCamoufox(
            headless=False,
        ).__aenter__()
    
    page = await camoufox.new_page()
    
    # BLOCK IMAGES, CSS, FONTS - saves memory + bandwidth
    async def block_resources(route):
        request = route.request
        resource_type = request.resource_type
        url = request.url.lower()
        
        # Block heavy resource types
        if resource_type in BLOCKED_RESOURCE_TYPES:
            await route.abort()
            return
        
        # Block by URL patterns
        for pattern in BLOCKED_URL_PATTERNS:
            if pattern in url:
                await route.abort()
                return
        
        await route.continue_()
    
    await page.route("**/*", block_resources)
    
    log(f"✅ Lightweight browser #{browser_id} ready")
    
    return camoufox, page

