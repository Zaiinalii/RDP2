def _pip_install(package):
    subprocess.check_call([sys.executable, "-m", "pip", "install", package])

def ensure_import(import_name, pip_name=None):
    try:
        importlib.import_module(import_name)
        INSTALL_RESULTS.append(f"✅ {import_name}: already installed")
        return True
    except Exception:
        try:
            print(f"📦 Installing {pip_name or import_name}...")
            _pip_install(pip_name or import_name)
            importlib.invalidate_caches()
            importlib.import_module(import_name)
            INSTALL_RESULTS.append(f"✅ {import_name}: installed successfully")
            return True
        except Exception as e:
            INSTALL_RESULTS.append(f"❌ {import_name}: FAILED - {e}")
            return False

print("📦 Checking/installing dependencies...")
for imp_name, pip_pkg in REQUIREMENTS.items():
    ensure_import(imp_name, pip_pkg)

# Force-install extras (e.g. camoufox[geoip]) even if base package present
for imp_name, extra_pkg in FORCE_INSTALL_EXTRAS.items():
    try:
        # Check if the extra is actually available (geoip2 module)
        importlib.import_module("geoip2")
        INSTALL_RESULTS.append(f"✅ {extra_pkg}: geoip extra present")
    except ImportError:
