# FGOS API HELPER
# ═══════════════════════════════════════════════════════════════════════════════

def fgos_api(method, path, json_data=None, params=None, timeout=20):
    """Call FGOS fleet API. Returns (response_json, success_bool)."""
    url = f"{FGOS_API_URL}/{path}"
    last_err = None
    for attempt in range(3):
        try:
            r = requests.request(
                method, url,
                headers=FGOS_HEADERS,
                json=json_data,
                params=params,
                timeout=timeout
            )
            if r.status_code in [200, 201]:
                try:
                    return r.json(), True
                except:
                    return {}, True
            else:
                # Log non-200 responses so we can debug
                body_preview = r.text[:300] if r.text else '(empty)'
                last_err = f"HTTP {r.status_code}: {body_preview}"
                print(f"FGOS API [{path}] attempt {attempt+1}/3: {last_err}")
                if attempt < 2:
                    time.sleep(2 ** attempt)
        except Exception as e:
            last_err = str(e)
            if attempt < 2:
                time.sleep(2 ** attempt)
            else:
                print(f"FGOS API error ({path}): {e}")
    if last_err:
        print(f"FGOS API [{path}] FAILED after 3 attempts: {last_err[:200]}")
    return {}, False

def fgos_register():
    """Register this VM with FGOS and get session_id."""
    global FGOS_SESSION_ID
    data, ok = fgos_api("POST", "register", {"vm_id": VM_ID})
    if ok:
        FGOS_SESSION_ID = data.get("session_id") or data.get("id")
        print(f"✅ Registered with FGOS — session: {FGOS_SESSION_ID}")
        return True
    print("⚠️ Could not register with FGOS (will continue anyway)")
    return False

# ═══════════════════════════════════════════════════════════════════════════════
# HEARTBEAT - Send to FGOS fleet API
# ═══════════════════════════════════════════════════════════════════════════════

import threading as _threading
_heartbeat_stop = _threading.Event()

# Global counters for heartbeat reporting
_HEARTBEAT_COUNTERS = {"keywords_done": 0, "gigs_done": 0, "gigs_found": 0, "errors_count": 0}

def update_heartbeat_counters(**kwargs):
    """Update counters that get sent with every heartbeat."""
    for k, v in kwargs.items():
        if k in _HEARTBEAT_COUNTERS:
            _HEARTBEAT_COUNTERS[k] = v

def send_heartbeat(status, message=""):
    """Send heartbeat to FGOS fleet API."""
    try:
        payload = {
            "vm_id": VM_ID,
            "status": status,
            "message": message[:200] if message else "",
            "keywords_done": _HEARTBEAT_COUNTERS["keywords_done"],
            "gigs_done": _HEARTBEAT_COUNTERS["gigs_done"],
            "gigs_found": _HEARTBEAT_COUNTERS["gigs_found"],
            "errors_count": _HEARTBEAT_COUNTERS["errors_count"],
        }
        if FGOS_SESSION_ID:
            payload["session_id"] = FGOS_SESSION_ID
        if SESSION_VPN_LOCATION:
            payload["vpn_location"] = SESSION_VPN_LOCATION
        if SESSION_IP:
            payload["ip_address"] = SESSION_IP
        fgos_api("POST", "heartbeat", payload)
        return True
    except:
        return False

def _heartbeat_loop():
    """Background thread: send heartbeat every 30s."""
    while not _heartbeat_stop.is_set():
        send_heartbeat("ALIVE")
        _heartbeat_stop.wait(30)

def start_heartbeat_thread():
    """Start background heartbeat thread."""
    t = _threading.Thread(target=_heartbeat_loop, daemon=True)
    t.start()

def stop_heartbeat_thread():
    """Stop the background heartbeat."""
    _heartbeat_stop.set()

def send_startup_heartbeat():
    """Register with FGOS and start heartbeat thread."""
    print(f"💓 Registering with FGOS...")
    fgos_register()
    start_heartbeat_thread()
    send_heartbeat("STARTED", "Script launched, initializing...")

def send_error_heartbeat(error_msg):
    """Send error notification to FGOS."""
    send_heartbeat("ERROR", str(error_msg)[:200])

def send_complete_heartbeat(summary):
    """Send completion notification to FGOS."""
    send_heartbeat("COMPLETED", summary)
    stop_heartbeat_thread()

