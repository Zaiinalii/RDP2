# Track which gigs have been scraped this session (to avoid re-scraping)
SCRAPED_GIGS = set()

def load_scraped_gigs_list():
    """Initialize scraped gigs tracking (FGOS tracks across sessions)."""
    global SCRAPED_GIGS
    SCRAPED_GIGS = set()
    log("📝 Scraped gigs tracking initialized (FGOS manages cross-session state)")
    return SCRAPED_GIGS

def save_scraped_gig_id(gig_id):
    """Mark gig as scraped locally + notify FGOS."""
    global SCRAPED_GIGS
    SCRAPED_GIGS.add(str(gig_id))
    fgos_gig_done(gig_id)

def get_gig_id_from_url(url):
    """Extract gig_id (username_slug) from URL."""
    import re
    match = re.search(r'fiverr\.com/([a-z0-9_]+)/([a-z0-9_-]+)', url, re.IGNORECASE)
    if match:
        return f"{match.group(1).lower()}_{match.group(2).lower()}"
    return None

def is_valid_gig_url(url):
    """Check if URL is a valid gig URL (not agency, category, etc.)."""
    if not url or 'fiverr.com' not in url:
        return False
    
    # Skip non-gig URLs
    invalid_patterns = ['/agencies/', '/categories/', '/search/', '/resources/', 
                       '/help/', '/cp/', '/business/', '/pro/', '/logo-maker/']
    for pattern in invalid_patterns:
        if pattern in url.lower():
            return False
    
    # Must match username/gig-slug pattern
    import re
    return bool(re.search(r'fiverr\.com/[a-z0-9_]+/[a-z0-9_-]+', url, re.IGNORECASE))

async def scrape_gig_details(page, gig_url):
    """Visit a gig page and extract ALL detailed seller information."""
    
    gig_id = get_gig_id_from_url(gig_url)
    
    try:
        await page.goto(gig_url, wait_until="domcontentloaded", timeout=30000)
        await asyncio.sleep(random.uniform(2, 4))
        
        # Dismiss any popups
        await dismiss_popups(page)
        
        # Scroll down to load reviews section
        await page.evaluate('window.scrollTo(0, document.body.scrollHeight / 2)')
        await asyncio.sleep(1)
        
        # Scroll down to trigger lazy loading of all page elements
        await page.evaluate('window.scrollTo(0, document.body.scrollHeight / 2)')
        await asyncio.sleep(1)
        
        # NOTE: We extract reviews from embedded JSON which is loaded at page load
        # The JSON contains recent reviews already - no need to click any filter
        # (Clicking "Most Recent" filter only changes DOM display, not the JSON)
        
        # Extract ALL gig details - FIRST try embedded JSON, THEN fall back to DOM
        gig_data = await page.evaluate('''
            () => {
                const data = {
                    // === SELLER INFO ===
                    seller_username: '',
                    seller_display_name: '',
                    seller_level: '',
                    seller_rating: '',
                    total_reviews: '0',
                    response_time: '',
                    member_since: '',
                    seller_country: '',
                    languages: '',
                    is_pro_seller: false,
                    is_choice_seller: false,
                    seller_description: '',
                    orders_in_queue: '',
                    last_delivery: '',
                    completed_orders: 0,
                    seller_skills: [],
                    seller_certifications: [],
                    seller_education: [],
                    seller_full_name: '',
                    seller_joined_date: '',
                    seller_is_verified: false,
                    seller_is_on_vacation: false,
                    seller_hourly_rate: '',
                    
                    // === GIG INFO ===
                    gig_title: '',
                    gig_description: '',
                    category_breadcrumb: '',
                    gig_tags: [],
                    gig_id: 0,
                    seller_id: 0,
                    
                    // === CATEGORY INFO ===
                    category_name: '',
                    category_slug: '',
                    subcategory_name: '',
                    subcategory_slug: '',
                    
                    // === PRICING (All 3 packages) ===
                    basic_price: '',
                    basic_name: '',
                    basic_delivery_days: '',
                    basic_revisions: '',
                    basic_features: [],
                    
                    standard_price: '',
                    standard_name: '',
                    standard_delivery_days: '',
                    standard_revisions: '',
                    standard_features: [],
                    
                    premium_price: '',
                    premium_name: '',
                    premium_delivery_days: '',
                    premium_revisions: '',
                    premium_features: [],
                    
                    // === REVIEWS DATA ===
                    reviews_breakdown: {
                        five_star: 0,
                        four_star: 0,
                        three_star: 0,
                        two_star: 0,
                        one_star: 0,
                        seller_communication: 0,
                        quality_of_delivery: 0,
                        value_of_delivery: 0
                    },
                    recent_reviews: [],
                    
                    // === FAQ ===
                    faq_items: [],
                    
                    // === ADDITIONAL ===
                    has_video: false,
                    gallery_images_count: 0,
                    gallery_items: [],
                    offers_video_consultation: false,
                    consultation_description: '',
                    consultation_pricing: [],
                    notable_clients: [],
                    favorites_count: 0,
                    price_range_low: '',
                    price_range_high: '',
                    portfolio_projects_count: 0,
                    seller_intro_video_url: '',
                    seller_other_gig_ids: [],
                    gig_description_html: '',
                    json_extracted: false
                };
                
                // ==========================================
                // METHOD 1: Extract from embedded JSON data (BEST - most reliable)
                // Fiverr embeds ALL gig data as JSON in a script tag
                // ==========================================
                try {
                    const scripts = document.querySelectorAll('script');
                    let gigData = null;
                    
                    for (const script of scripts) {
                        const text = script.textContent || '';
                        
                        // Look for the main gig data object that contains all info
                        if (text.includes('"general":{"gigId"') || text.includes('{"abTestsCalculations"')) {
                            try {
                                // Find the start of the JSON object
                                let jsonStart = text.indexOf('{"abTestsCalculations"');
                                if (jsonStart === -1) {
                                    jsonStart = text.indexOf('{"general":{"gigId"');
                                }
                                
                                if (jsonStart !== -1) {
                                    // Find matching closing brace by counting
                                    let braceCount = 0;
                                    let jsonEnd = jsonStart;
                                    for (let i = jsonStart; i < text.length; i++) {
                                        if (text[i] === '{') braceCount++;
                                        if (text[i] === '}') braceCount--;
                                        if (braceCount === 0) {
                                            jsonEnd = i + 1;
                                            break;
                                        }
                                    }
                                    
                                    const jsonStr = text.substring(jsonStart, jsonEnd);
                                    gigData = JSON.parse(jsonStr);
                                    break;
                                }
                            } catch (e) {
                                // JSON parse failed, will try DOM method
                            }
                        }
                    }
                    
                    // If we found the JSON data, extract EVERYTHING from it
                    if (gigData) {
                        data.json_extracted = true;
                        
                        // === GENERAL INFO ===
                        if (gigData.general) {
                            data.gig_id = gigData.general.gigId || 0;
                            data.gig_title = gigData.general.gigTitle || '';
                            data.category_name = gigData.general.categoryName || '';
                            data.category_slug = gigData.general.categorySlug || '';
                            data.subcategory_name = gigData.general.subCategoryName || '';
                            data.subcategory_slug = gigData.general.subCategorySlug || '';
                            data.seller_id = gigData.general.sellerId || 0;
                            data.is_pro_seller = gigData.general.isPro || false;
                            
                            // Build category breadcrumb from parts
                            const parts = [data.category_name, data.subcategory_name].filter(p => p);
                            data.category_breadcrumb = parts.join(' > ');
                        }
                        
                        // === OVERVIEW SECTION ===
                        if (gigData.overview) {
                            if (gigData.overview.gig) {
                                data.seller_rating = String(gigData.overview.gig.rating || '');
                                data.total_reviews = String(gigData.overview.gig.ratingsCount || '0');
                                data.orders_in_queue = String(gigData.overview.gig.ordersInQueue || '');
                            }
                            if (gigData.overview.seller) {
                                data.seller_username = gigData.overview.seller.username || '';
                                data.seller_country = gigData.overview.seller.countryCode || '';
                                data.is_pro_seller = gigData.overview.seller.isPro || data.is_pro_seller;
                                
                                // Convert achievement number to level text
                                // achievement: 0=New, 1=Level 1, 2=Level 2, 3=Top Rated
                                const achievement = gigData.overview.seller.achievement || 0;
                                const levelMap = {0: 'New Seller', 1: 'Level 1', 2: 'Level 2', 3: 'Top Rated'};
                                data.seller_level = levelMap[achievement] || '';
                                
                                // Languages from overview
                                if (gigData.overview.seller.proficientLanguages) {
                                    const langs = gigData.overview.seller.proficientLanguages.map(l => l.name.toUpperCase());
                                    data.languages = langs.join(', ');
                                }
                            }
                        }
                        
                        // === SELLER CARD ===
                        if (gigData.sellerCard) {
                            data.seller_description = gigData.sellerCard.description || '';
                            data.response_time = gigData.sellerCard.responseTime ? 
                                String(gigData.sellerCard.responseTime) + ' hours' : '';
                            data.seller_rating = data.seller_rating || String(gigData.sellerCard.rating || '');
                            data.total_reviews = data.total_reviews || String(gigData.sellerCard.ratingsCount || '0');
                            data.seller_country = data.seller_country || gigData.sellerCard.countryCode || '';
                            
                            // Member since (convert timestamp to date)
                            if (gigData.sellerCard.memberSince) {
                                const date = new Date(gigData.sellerCard.memberSince * 1000);
                                data.member_since = date.toISOString().split('T')[0];
                            }
                        }
                        
                        // === SELLER DATA (more details) ===
                        if (gigData.seller) {
                            if (gigData.seller.user && gigData.seller.user.profile) {
                                data.seller_display_name = gigData.seller.user.profile.displayName || '';
                            }
                            if (gigData.seller.user) {
                                data.seller_username = data.seller_username || gigData.seller.user.name || '';
                                data.seller_full_name = gigData.seller.user.fullName || '';
                                if (gigData.seller.user.joinedAt) {
                                    const joinDate = new Date(gigData.seller.user.joinedAt * 1000);
                                    data.seller_joined_date = joinDate.toISOString().split('T')[0];
                                }
                            }
                            
                            // Seller level from seller object (more accurate)
                            if (gigData.seller.sellerLevel) {
                                const levelTextMap = {
                                    'LEVEL_ONE': 'Level 1',
                                    'LEVEL_TWO': 'Level 2',
                                    'TOP_RATED': 'Top Rated'
                                };
                                data.seller_level = levelTextMap[gigData.seller.sellerLevel] || data.seller_level;
                            }
                            
                            data.completed_orders = gigData.seller.completedOrdersCount || 0;
                            data.seller_is_verified = gigData.seller.isVerified || false;
                            data.seller_is_on_vacation = gigData.seller.isOnVacation || false;
                            
                            // Hourly rate
                            if (gigData.seller.hourlyRate) {
                                data.seller_hourly_rate = '$' + (gigData.seller.hourlyRate.priceInCents / 100).toFixed(0);
                            }
                            
                            // Skills with level info
                            if (gigData.seller.activeStructuredSkills) {
                                data.seller_skills = gigData.seller.activeStructuredSkills.map(s => ({
                                    name: s.name,
                                    level: s.level
                                }));
                            }
                            
                            // Certifications
                            if (gigData.seller.certifications) {
                                data.seller_certifications = gigData.seller.certifications.map(c => ({
                                    name: c.certificationName,
                                    from: c.receivedFrom,
                                    year: c.year
                                }));
                            }
                            
                            // Education
                            if (gigData.seller.activeEducations) {
                                data.seller_education = gigData.seller.activeEducations.map(e => ({
                                    title: e.title,
                                    school: e.school,
                                    country: e.countryCode,
                                    major: e.major,
                                    year: e.graduationYear
                                }));
                            }
                        }
                        
                        // === PACKAGES (Full pricing info) ===
                        if (gigData.packages && gigData.packages.packageList) {
                            const pkgList = gigData.packages.packageList;
                            
                            if (pkgList[0]) {
                                data.basic_name = pkgList[0].title || 'Basic';
