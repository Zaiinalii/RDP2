async def search_keyword_humanized(page, keyword):
    """Go to Fiverr homepage and search like a human. Retries on nav failure."""
    
    # Navigate to Fiverr with retry logic
    max_nav_retries = 3
    nav_ok = False
    for attempt in range(1, max_nav_retries + 1):
        try:
            log(f"🏠 Going to Fiverr homepage..." + (f" (attempt {attempt})" if attempt > 1 else ""))
            await page.goto("https://www.fiverr.com", wait_until="domcontentloaded", timeout=60000)
            nav_ok = True
            break
        except Exception as nav_err:
            err_str = str(nav_err)
            log(f"⚠️ Navigation failed (attempt {attempt}/{max_nav_retries}): {err_str[:80]}")
            if attempt < max_nav_retries:
                wait_time = 5 * attempt
                log(f"   ⏳ Retrying in {wait_time}s...")
                await asyncio.sleep(wait_time)
            else:
                log(f"❌ Navigation failed after {max_nav_retries} attempts")
                return False
    
    if not nav_ok:
        return False
    
    # Wait for page to settle
    await asyncio.sleep(random.uniform(2, 4))
    
    # Find search box
    search_selectors = [
        "input[type='search'][placeholder='Search for any service...']",
        "input[placeholder*='Search']",
        "input.search-input",
        "input[name='query']",
        "input[type='search']",
        "#search-input",
        "[data-testid='search-input']"
    ]
    
    search_box = None
    for selector in search_selectors:
        try:
            search_box = await page.wait_for_selector(selector, timeout=5000)
            if search_box:
                log(f"✅ Found search box")
                break
        except:
            continue
    
    if not search_box:
        # Log page state for debugging
        try:
            page_url = page.url
            page_title = await page.title()
            log(f"❌ Could not find search box! URL={page_url}, Title='{page_title[:60]}'")
            # Check if it's a captcha/challenge page
            body_text = await page.evaluate('document.body?.innerText?.substring(0, 200) || ""')
            if body_text:
                log(f"   📄 Page content: {body_text[:150]}")
        except:
            log("❌ Could not find search box! (failed to get page info)")
        return False
    
    # Click and type like a human
    await search_box.click()
    await asyncio.sleep(random.uniform(0.3, 0.7))
    
    # Type character by character with random delays
    for char in keyword:
        await page.keyboard.type(char)
        await asyncio.sleep(random.uniform(0.05, 0.15))
    
    log(f"⌨️ Typed: '{keyword}'")
    await asyncio.sleep(random.uniform(0.5, 1.0))
    
    # Submit search
    await page.keyboard.press("Enter")
    log("🔍 Search submitted")
    
    # Wait for results
    await asyncio.sleep(random.uniform(3, 5))
    
    # Dismiss any popups that appeared after search
    await dismiss_popups(page)
    
    return True

async def extract_gigs_from_page(page, page_num, keyword):
    """Extract ALL gigs from current page with their positions, detecting sponsored ads."""
    gigs = []
    
    # Dismiss any popups before extracting
    await dismiss_popups(page)
    
    # Wait for gig cards to load
    try:
        await page.wait_for_selector('.gig-card-layout, div[data-gig-id], .gig-wrapper, .basic-gig-card', timeout=15000)
    except:
        pass
    
    # Dismiss any popups that appeared
    await dismiss_popups(page)
    
    # Scroll down to load ALL gigs (Fiverr uses lazy loading)
    for i in range(5):
        await page.evaluate(f'window.scrollTo(0, document.body.scrollHeight * {(i+1)/5})')
        await asyncio.sleep(0.5)
    
    # Scroll back to top
    await page.evaluate('window.scrollTo(0, 0)')
    await asyncio.sleep(1)
    
    # Extract gig URLs using JavaScript - also detect sponsored/promoted gigs
    js_result = await page.evaluate('''
        () => {
            const gigs = [];
            const seen = new Set();
            let organicPosition = 0;
            let adPosition = 0;
            
            // Known organic badge image filename (Fiverr uses image badges, not text!)
            // Organic gigs use: zUUYHKl3t97xHPG1.png
            // Ad gigs use different images like: 65jNBr1mdFbLzs0b.png, kcHY4XIS1zG1WLfq.png, 3AUmqmS6n9Ky56sH.png
            const ORGANIC_BADGE = 'zUUYHKl3t97xHPG1.png';
            
            // Find all gig cards (not just links)
            const gigCards = document.querySelectorAll('.gig-card-layout, .basic-gig-card, .gig-wrapper, [class*="gig-card"]');
            
            gigCards.forEach(card => {
                // Check if this gig is a sponsored ad by looking at the badge IMAGE
                // Fiverr uses images instead of text for "Ad" labels to avoid detection
                
                let isSponsored = false;
                
                // Method 1: Check badge image in the seller area
                // The badge image appears right after the username link in span._1lc1p3l1
                const sellerSpan = card.querySelector('span._1lc1p3l1, span[class*="1lc1p3l"]');
                if (sellerSpan) {
                    const badgeImg = sellerSpan.querySelector('img[src*="generic_asset"]');
                    if (badgeImg) {
                        const src = badgeImg.src || badgeImg.getAttribute('src') || '';
                        // If badge is NOT the organic badge, it's an ad
                        if (!src.includes(ORGANIC_BADGE)) {
                            isSponsored = true;
                        }
                    }
                }
                
                // Method 2: Check all badge images in the card's seller area
                if (!isSponsored) {
                    const badgeImages = card.querySelectorAll('img[src*="generic_asset/asset/18e23d1a4837c0351e5e1096d73da37a"]');
                    badgeImages.forEach(img => {
                        const src = img.src || img.getAttribute('src') || '';
                        if (src && !src.includes(ORGANIC_BADGE)) {
                            isSponsored = true;
                        }
                    });
                }
                
                // Find the gig link within this card
                const link = card.querySelector('a[href*="fiverr.com/"]') || card.closest('a[href*="fiverr.com/"]');
                if (!link) return;
                
                const href = link.href || link.getAttribute('href');
                if (!href) return;
                
                // Match gig URL pattern: fiverr.com/username/gig-slug
                const match = href.match(/fiverr\\.com\\/([a-z0-9_]+)\\/([a-z0-9_-]+)/i);
                if (match) {
                    const username = match[1].toLowerCase();
                    const slug = match[2].toLowerCase();
                    
                    // Skip non-gig URLs
                    if (['categories', 'search', 'resources', 'help', 'cp', 'business', 'pro'].includes(username)) return;
                    if (slug.includes('?')) return;
                    
                    const gig_id = username + '_' + slug;
                    if (!seen.has(gig_id)) {
                        seen.add(gig_id);
                        
                        // Track position separately for ads vs organic
                        if (isSponsored) {
                            adPosition++;
                        } else {
                            organicPosition++;
                        }
                        
                        gigs.push({
                            gig_id: gig_id,
                            username: username,
                            gig_slug: slug,
                            url: 'https://www.fiverr.com/' + username + '/' + slug,
                            is_sponsored: isSponsored,
                            ad_position: isSponsored ? adPosition : null,
                            organic_position: isSponsored ? null : organicPosition
                        });
                    }
                }
            });
            
            // If card-based detection found nothing, fallback to link-based
            if (gigs.length === 0) {
                document.querySelectorAll('.basic-gig-card a, .gig-card-layout a, .gig-wrapper a, a[href*="fiverr.com/"]').forEach(a => {
                    const href = a.href || a.getAttribute('href');
                    if (!href) return;
                    
                    const match = href.match(/fiverr\\.com\\/([a-z0-9_]+)\\/([a-z0-9_-]+)/i);
                    if (match) {
                        const username = match[1].toLowerCase();
                        const slug = match[2].toLowerCase();
                        
                        if (['categories', 'search', 'resources', 'help', 'cp', 'business', 'pro'].includes(username)) return;
                        if (slug.includes('?')) return;
                        
                        const gig_id = username + '_' + slug;
                        if (!seen.has(gig_id)) {
                            seen.add(gig_id);
                            organicPosition++;
                            gigs.push({
                                gig_id: gig_id,
                                username: username,
                                gig_slug: slug,
                                url: 'https://www.fiverr.com/' + username + '/' + slug,
                                is_sponsored: false,
                                ad_position: null,
                                organic_position: organicPosition
                            });
                        }
                    }
                });
            }
            
            return gigs;
        }
    ''')
    
    # Calculate page-based positions
    base_organic = (page_num - 1) * 48  # Approximate organic gigs per page
    base_ad = (page_num - 1) * 10  # Approximate ads per page (usually fewer)
    
    # Add metadata (including IP/location)
    scraped_at = datetime.now().isoformat()
    overall_position = 0
    
    for gig in js_result:
        overall_position += 1
        gig['overall_position'] = (page_num - 1) * 48 + overall_position  # Position on page regardless of ad/organic
        gig['page'] = page_num
        gig['keyword'] = keyword
        gig['scraped_at'] = scraped_at
        gig['ip_address'] = SESSION_IP or 'Unknown'
        gig['city'] = SESSION_CITY or 'Unknown'
        gig['country'] = SESSION_COUNTRY or 'Unknown'
        gig['vpn_location'] = SESSION_VPN_LOCATION or 'None'
        
        # Adjust page-based organic/ad positions
        if gig.get('organic_position'):
            gig['organic_position'] = base_organic + gig['organic_position']
        if gig.get('ad_position'):
            gig['ad_position'] = base_ad + gig['ad_position']
        
        gigs.append(gig)
    
    # Log sponsored vs organic counts
    sponsored_count = sum(1 for g in gigs if g.get('is_sponsored'))
    organic_count = len(gigs) - sponsored_count
    if sponsored_count > 0:
        log(f"   📢 Found {sponsored_count} ads, {organic_count} organic gigs")
    
    return gigs

async def go_to_next_page(page, current_page):
    """Navigate to next page of results."""
    # Dismiss any popups before clicking
    await dismiss_popups(page)
    
    # Try clicking next button
    next_selectors = [
        'a[rel="next"]',
        '.pagination-next',
        f'a[href*="page={current_page + 1}"]',
        'button:has-text("Next")',
        '.pagination a:last-child'
    ]
    
    for selector in next_selectors:
        try:
            next_btn = await page.query_selector(selector)
            if next_btn:
                is_visible = await next_btn.is_visible()
                if is_visible:
                    # Try to click, dismiss popup if blocked
                    try:
                        await next_btn.click()
                    except Exception as click_err:
                        if 'intercept' in str(click_err).lower():
                            await dismiss_popups(page)
                            await asyncio.sleep(0.5)
                            await next_btn.click()
                    await asyncio.sleep(random.uniform(3, 5))
                    # Dismiss any popups on new page
                    await dismiss_popups(page)
                    return True
        except:
            continue
    
    # Try URL-based pagination (more reliable)
    try:
        current_url = page.url
        if 'page=' in current_url:
            new_url = current_url.replace(f'page={current_page}', f'page={current_page + 1}')
        else:
            separator = '&' if '?' in current_url else '?'
            new_url = f"{current_url}{separator}page={current_page + 1}"
        
        await page.goto(new_url, wait_until="domcontentloaded", timeout=30000)
        await asyncio.sleep(random.uniform(2, 4))
        # Dismiss any popups on new page
        await dismiss_popups(page)
        return True
    except:
        return False

async def scrape_keyword_all_pages(page, keyword):
    """Scrape ALL pages (up to 10) for a keyword and extract ALL gigs."""
    all_gigs = []
    
    log(f"\n{'='*70}")
    log(f"🔍 SCRAPING KEYWORD: '{keyword}'")
    log(f"{'='*70}")
    
    # Search the keyword
    if not await search_keyword_humanized(page, keyword):
        return all_gigs
    
    # Scrape each page
    for page_num in range(1, MAX_PAGES + 1):
        log(f"\n📄 Page {page_num}/{MAX_PAGES}...")
        
        # Extract gigs from current page
        gigs = await extract_gigs_from_page(page, page_num, keyword)
        
        if not gigs:
            log(f"   ⚠️ No gigs found on page {page_num}, stopping")
            break
        
        all_gigs.extend(gigs)
        log(f"   ✅ Extracted {len(gigs)} gigs (Total: {len(all_gigs)})")
        
        # Check if we've reached the last page
        if page_num >= MAX_PAGES:
            log(f"   📊 Reached max pages ({MAX_PAGES})")
            break
        
        # Go to next page
        log(f"   ➡️ Going to page {page_num + 1}...")
        if not await go_to_next_page(page, page_num):
            log(f"   ⚠️ No more pages available")
            break
        
        # Random delay between pages
        await asyncio.sleep(random.uniform(MIN_DELAY, MAX_DELAY))
    
    log(f"\n✅ KEYWORD '{keyword}' COMPLETE: {len(all_gigs)} total gigs")
    
    # Summary with sponsored breakdown
    sponsored = sum(1 for g in all_gigs if g.get('is_sponsored'))
    organic = len(all_gigs) - sponsored
    log(f"   📊 {organic} organic gigs, {sponsored} sponsored ads")
    
    # Check for NEW gigs (not in master list) and track them
    # (FGOS tracks gig URLs automatically via ingest-keyword)
    
    return all_gigs

