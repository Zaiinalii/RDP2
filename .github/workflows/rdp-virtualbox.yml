def save_keyword_results(keyword, gigs):
    """Save keyword scrape results to FGOS."""
    if not gigs:
        log(f"⚠️ No gigs to save for '{keyword}'")
        return False
    return fgos_ingest_keyword(keyword, gigs)

def save_session_summary(all_results):
    """Log session summary (FGOS already has all data from per-keyword ingestion)."""
    if not all_results:
        return False
    total_gigs = sum(len(g) for g in all_results.values())
    total_sponsored = sum(1 for gigs in all_results.values() for g in gigs if g.get('is_sponsored'))
    total_organic = total_gigs - total_sponsored
    log(f"✅ Session summary: {total_gigs} gigs ({total_organic} organic, {total_sponsored} ads) from {len(all_results)} keywords")
    return True

