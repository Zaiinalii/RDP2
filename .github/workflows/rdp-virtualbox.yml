def fgos_claim_keyword():
    """
    Claim next keyword from FGOS (PostgreSQL FOR UPDATE SKIP LOCKED).
    Returns (keyword_index, keyword, error) tuple:
      - (idx, keyword, None) = claimed successfully
      - (None, None, None) = genuinely all done
      - (None, None, 'api_error') = API failed, should retry
    """
    data, ok = fgos_api("GET", "claim-keyword", params={
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID
    })
    if ok:
        kw = data.get("keyword")
        idx = data.get("keyword_index", 0)
        if kw:
            log(f"🎯 Claimed keyword #{idx}: '{kw}'")
            return idx, kw, None
        
        # API returned OK but no keyword — all keywords are done
        # (backend returns status:"none" or status:"ok" with no keyword)
        recovery = _fgos_recover_claimed_keyword()
        if recovery:
            return recovery[0], recovery[1], None
        log("✅ All keywords already claimed/completed")
        return None, None, None

    # Claim API failed — check if the claim actually succeeded on the server
    # (response was lost but DB was updated)
    log("⚠️ Claim-keyword API failed, checking for recovery...")
    recovery = _fgos_recover_claimed_keyword()
    if recovery:
        return recovery[0], recovery[1], None

    log("⚠️ Could not claim keyword from FGOS (API error)")
    return None, None, 'api_error'


def _fgos_recover_claimed_keyword():
    """Check if this VM already has a claimed (not completed) keyword on server."""
    data, ok = fgos_api("GET", "my-keywords", params={
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID
    })
    if ok and data.get("keywords"):
        # Find keywords that are claimed but not completed
        for kw in data["keywords"]:
            if kw.get("status") == "claimed":
                idx = kw.get("keyword_index", 0)
                keyword = kw.get("keyword")
                if keyword:
                    log(f"🔄 Recovered claimed keyword #{idx}: '{keyword}' (claim was lost)")
                    return idx, keyword
    return None

def fgos_keyword_done(keyword, gigs_found, pages_scraped, gigs=None):
    """Report keyword completion to FGOS."""
    payload = {
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID,
        "keyword": keyword,
        "gigs_found": gigs_found,
        "pages_scraped": pages_scraped,
    }
    if gigs:
        # Backend expects [{url, gig_id}] objects, not plain strings
        payload["gigs"] = [
            {"url": clean_gig_url(g.get("url", "")), "gig_id": g.get("gig_id", get_gig_id_from_url(g.get("url", "")) or "")}
            for g in gigs if g.get("url")
        ]
    fgos_api("POST", "keyword-done", payload)
    # Update heartbeat counters
    update_heartbeat_counters(keywords_done=_HEARTBEAT_COUNTERS["keywords_done"] + 1, gigs_found=_HEARTBEAT_COUNTERS["gigs_found"] + gigs_found)

def fgos_keyword_failed(keyword, error):
    """Report keyword failure to FGOS."""
    fgos_api("POST", "keyword-failed", {
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID,
        "keyword": keyword,
        "error": str(error)[:200]
    })

def fgos_claim_gig():
    """
    Claim next gig from FGOS.
    Returns (gig_id, gig_url) or (None, None) if all done.
    """
    data, ok = fgos_api("GET", "claim-gig", params={
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID
    })
    if ok:
        gig_id = data.get("gig_id")
        url = data.get("url", "")
        if url:
            return gig_id, url
        # API returned OK but no gig — all gigs are done
        return None, None
    return None, None

def fgos_gig_done(gig_id):
    """Report gig completion to FGOS."""
    fgos_api("POST", "gig-done", {
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID,
        "gig_id": str(gig_id)
    })
    # Update heartbeat counters
    update_heartbeat_counters(gigs_done=_HEARTBEAT_COUNTERS["gigs_done"] + 1)

def fgos_ingest_keyword(keyword, gigs):
    """Send keyword scrape results to FGOS."""
    if not gigs:
        return False
    sponsored_count = sum(1 for g in gigs if g.get('is_sponsored'))
    organic_count = len(gigs) - sponsored_count
    
    payload = {
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID,
        "keyword": keyword,
        "total_gigs": len(gigs),
        "organic_count": organic_count,
        "sponsored_count": sponsored_count,
        "gigs": gigs
    }
    # For large payloads (500+ gigs), use longer timeout
    _timeout = 60 if len(gigs) > 200 else 30
    data, ok = fgos_api("POST", "ingest-keyword", payload, timeout=_timeout)
    if ok:
        log(f"✅ Ingested {len(gigs)} gigs to FGOS for '{keyword}'")
        log(f"   📊 {organic_count} organic, {sponsored_count} sponsored")
    else:
        log(f"❌ Failed to ingest keyword data to FGOS ({len(gigs)} gigs, {_timeout}s timeout)")
    return ok

def fgos_ingest_gig_details(gig_data_list):
    """Send gig detail results to FGOS."""
    if not gig_data_list:
        return False
    payload = {
        "vm_id": VM_ID,
        "session_id": FGOS_SESSION_ID,
        "gigs": gig_data_list
    }
    data, ok = fgos_api("POST", "ingest-gig-details", payload, timeout=30)
    if ok:
        log(f"✅ Ingested {len(gig_data_list)} gig details to FGOS")
    else:
        log(f"❌ Failed to ingest gig details to FGOS")
    return ok

