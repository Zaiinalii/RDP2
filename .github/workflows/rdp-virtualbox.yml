name: Fiverr Scraper (Direct + PIA VPN)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: windows-latest
    timeout-minutes: 360  # 6 hours (GitHub hosted runner max)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── PYTHON SETUP ────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          Write-Host "📦 Installing Python dependencies..."
          pip install --upgrade pip
          pip install playwright requests certifi "camoufox[geoip]" browserforge
          
          Write-Host "🦊 Installing Playwright Firefox..."
          python -m playwright install firefox
          
          Write-Host "🦊 Fetching Camoufox browser..."
          python -m camoufox fetch
          
          Write-Host "✅ All dependencies installed!"

      # ─── PIA VPN SETUP ───────────────────────────────────────────
      - name: Install PIA VPN
        run: |
          Write-Host "🌐 Downloading PIA VPN installer..."
          $piaUrl = "https://installers.privateinternetaccess.com/download/pia-windows-x64.exe"
          $piaInstaller = "$env:TEMP\pia-install.exe"
          
          Invoke-WebRequest -Uri $piaUrl -OutFile $piaInstaller -UseBasicParsing
          
          Write-Host "📦 Installing PIA VPN silently..."
          Start-Process -FilePath $piaInstaller -ArgumentList "--silent" -Wait
          
          # Wait for PIA service to fully start
          Start-Sleep -Seconds 20
          
          $piactl = "C:\Program Files\Private Internet Access\piactl.exe"
          if (Test-Path $piactl) {
              Write-Host "✅ PIA VPN installed successfully!"
          } else {
              Write-Error "❌ PIA VPN installation failed!"
              exit 1
          }

      - name: Login and Connect PIA VPN
        run: |
          $piactl = "C:\Program Files\Private Internet Access\piactl.exe"
          
          # Enable background mode (no GUI needed)
          & $piactl background enable
          Start-Sleep -Seconds 3
          
          # Login using credentials file
          $credsFile = "$env:TEMP\pia-creds.txt"
          "p8158950`nGoYoula@niba12`$2323" | Out-File -FilePath $credsFile -Encoding ascii -NoNewline
          & $piactl login $credsFile
          Remove-Item $credsFile -Force
          Start-Sleep -Seconds 5
          
          # Set a random US location and connect
          $locations = @("us-east", "us-west", "us-california", "us-chicago", "us-texas", "us-florida", "us-atlanta", "us-denver", "us-seattle", "us-new-york-city")
          $location = $locations | Get-Random
          Write-Host "🌐 Connecting to PIA: $location"
          & $piactl set region $location
          & $piactl connect
          
          # Wait for connection (max 30s)
          $connected = $false
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              $state = & $piactl get connectionstate
              Write-Host "   ⏳ State: $state ($($i+1)/15)"
              if ($state -eq "Connected") {
                  $connected = $true
                  break
              }
          }
          
          if ($connected) {
              Write-Host "✅ PIA VPN connected to $location!"
              # Show new IP
              $ip = (Invoke-WebRequest -Uri "https://api.ipify.org" -UseBasicParsing -TimeoutSec 10).Content
              Write-Host "📍 Public IP: $ip"
          } else {
              Write-Host "⚠️ VPN connection slow, Mainbot.py will handle it"
          }

      # ─── RUN THE SCRAPER ─────────────────────────────────────────
      - name: Run Scraper
        env:
          PIA_USERNAME: "p8158950"
          PIA_PASSWORD: "GoYoula@niba12$2323"
          FGOS_API_KEY: "fgos-scraper-key-2026-secure"
        run: |
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "  🚀 Starting Fiverr Scraper (FGOS Fleet)"
          Write-Host "=========================================="
          Write-Host "  Mode: Direct on runner + PIA VPN"
          Write-Host "  Backend: FGOS Fleet API"
          Write-Host "=========================================="
          Write-Host ""
          
          python Mainbot.py