# LOGGING
# ═══════════════════════════════════════════════════════════════════════════════

# FGOS log buffer - auto-flushes every 50 entries
_LOG_BUFFER = []
_LOG_BUFFER_LOCK = _threading.Lock()

def _flush_logs_to_fgos():
    """Send buffered logs to FGOS."""
    global _LOG_BUFFER
    with _LOG_BUFFER_LOCK:
        if not _LOG_BUFFER:
            return
        batch = _LOG_BUFFER[:]
        _LOG_BUFFER = []
    try:
        fgos_api("POST", "logs", {
            "vm_id": VM_ID,
            "session_id": FGOS_SESSION_ID,
            "logs": batch
        }, timeout=10)
    except:
        pass  # Don't crash on log failure

def log(msg, level="info"):
    timestamp = datetime.now().strftime("%H:%M:%S")
    full_timestamp = datetime.now().strftime("%Y-%m-%d %H:%M:%S")
    log_line = f"[{timestamp}] [{VM_ID}] {msg}"
    print(log_line)
    # Store in buffer for FGOS — backend expects {level, message, source} objects
    log_entry = {"level": level, "message": f"[{full_timestamp}] [{VM_ID}] {msg}", "source": "runner"}
    SESSION_LOGS.append(log_entry)
    with _LOG_BUFFER_LOCK:
        _LOG_BUFFER.append(log_entry)
        if len(_LOG_BUFFER) >= 50:
            pass  # Will flush below
        else:
            return
    _flush_logs_to_fgos()

