name: Fiverr Scraper (Direct + PIA VPN)

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours (GitHub hosted runner max)

    env:
      DISPLAY: ":99"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── VIRTUAL DISPLAY (needed for PIA installer + browser) ───
      - name: Start Virtual Display
        run: |
          echo "🖥️ Installing and starting Xvfb virtual display..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb xauth
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "✅ Virtual display running on :99"

      # ─── PYTHON SETUP ────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          echo "📦 Installing Python dependencies..."
          pip install --upgrade pip
          pip install playwright requests certifi "camoufox[geoip]" browserforge
          
          echo "🦊 Installing Playwright Firefox..."
          python -m playwright install firefox
          python -m playwright install-deps firefox
          
          echo "🦊 Fetching Camoufox browser..."
          python -m camoufox fetch
          
          echo "✅ All dependencies installed!"

      # ─── PIA VPN SETUP ───────────────────────────────────────────
      - name: Install PIA VPN
        run: |
          echo "🌐 Downloading PIA VPN Linux installer from R2..."
          PIA_URL="https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/pia-linux-3.7-08412.run"
          PIA_INSTALLER="/tmp/pia-install.run"
          
          curl -fSL "$PIA_URL" -o "$PIA_INSTALLER"
          
          FILE_SIZE=$(stat -c%s "$PIA_INSTALLER")
          echo "📥 Downloaded: $(echo "scale=1; $FILE_SIZE / 1048576" | bc) MB"
          
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "❌ Download too small ($FILE_SIZE bytes) - likely failed"
            exit 1
          fi
          
          echo "📦 Installing PIA VPN (official sh method - as normal user)..."
          chmod +x "$PIA_INSTALLER"
          
          # PIA requires running as normal user, NOT root
          sh "$PIA_INSTALLER" || true
          
          # Wait for install + daemon to start
          sleep 15
          
          # Check multiple known install locations
          PIACTL=""
          if command -v piactl &>/dev/null; then
            PIACTL=$(command -v piactl)
          elif [ -f "/opt/piavpn/bin/piactl" ]; then
            PIACTL="/opt/piavpn/bin/piactl"
          elif [ -f "/usr/local/bin/piactl" ]; then
            PIACTL="/usr/local/bin/piactl"
          fi
          
          if [ -n "$PIACTL" ]; then
            echo "✅ PIA VPN installed at: $PIACTL"
            "$PIACTL" --version || true
            # Check if daemon is running
            echo "📋 PIA daemon status:"
            systemctl status piavpn 2>/dev/null || true
            ps aux | grep -i pia | grep -v grep || true
          else
            echo "❌ piactl not found after install. Diagnostics:"
            echo ""
            echo "🔍 Searching for piactl..."
            sudo find / -name "piactl" -type f 2>/dev/null || true
            echo ""
            echo "🔍 Searching for pia* binaries..."
            sudo find /opt /usr/local /usr/bin -name "pia*" 2>/dev/null || true
            echo ""
            echo "📂 /opt contents:"
            ls -la /opt/ 2>/dev/null || true
            ls -la /opt/piavpn/ 2>/dev/null || true
            echo ""
            echo "📋 Recent installer output in syslog:"
            sudo tail -30 /var/log/syslog 2>/dev/null | grep -i pia || true
            echo ""
            echo "📋 systemd services with pia:"
            systemctl list-units --all | grep -i pia || true
            exit 1
          fi

      - name: Login PIA VPN (no connect - Mainbot.py handles VPN)
        run: |
          # Make sure piactl is in PATH
          export PATH="/opt/piavpn/bin:/usr/local/bin:$PATH"
          
          # Enable background mode (no GUI needed)
          piactl background enable || true
          sleep 3
          
          # Login using credentials file (DO NOT connect here - it kills the runner)
          CREDS_FILE=$(mktemp)
          printf 'p8158950\nGoYoula@niba12$2323' > "$CREDS_FILE"
          piactl login "$CREDS_FILE"
          rm -f "$CREDS_FILE"
          sleep 3
          
          echo "✅ PIA logged in. VPN connect will be handled by Mainbot.py"
          echo "   (Connecting here would reroute all traffic and kill the GitHub runner)"

      # ─── RUN THE SCRAPER ─────────────────────────────────────────
      - name: Download Mainbot.py from R2
        run: |
          echo "📥 Downloading latest Mainbot.py from R2..."
          curl -fSL "https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/Mainbot.py" -o Mainbot.py
          FILE_SIZE=$(stat -c%s "Mainbot.py")
          echo "✅ Downloaded Mainbot.py ($FILE_SIZE bytes, $(wc -l < Mainbot.py) lines)"

      - name: Run Scraper
        env:
          PIA_USERNAME: "p8158950"
          PIA_PASSWORD: "GoYoula@niba12$2323"
          FGOS_API_KEY: "fgos-scraper-key-2026-secure"
        run: |
          echo ""
          echo "=========================================="
          echo "  🚀 Starting Fiverr Scraper (FGOS Fleet)"
          echo "=========================================="
          echo "  Mode: Direct on runner + PIA VPN"
          echo "  Backend: FGOS Fleet API"
          echo "  Display: Virtual (Xvfb :99)"
          echo "=========================================="
          echo ""
          
          # Make sure piactl is in PATH
          export PATH="/opt/piavpn/bin:/usr/local/bin:$PATH"
          
          python Mainbot.py