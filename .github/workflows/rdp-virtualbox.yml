                                data.premium_delivery_days = Math.ceil(pkgList[2].duration / 24) + ' days';
                                data.premium_revisions = pkgList[2].revisions?.value || 0;
                                data.premium_features = (pkgList[2].features || [])
                                    .filter(f => f.included)
                                    .map(f => f.label || f.name);
                            }
                        }
                        
                        // === REVIEWS BREAKDOWN (from reviews object) ===
                        if (gigData.reviews) {
                            data.total_reviews = String(gigData.reviews.total_count || data.total_reviews);
                            data.seller_rating = String(gigData.reviews.average_valuation || data.seller_rating);
                            
                            // Star breakdown from array
                            if (gigData.reviews.breakdown) {
                                for (const item of gigData.reviews.breakdown) {
                                    switch(item.average_valuation_value) {
                                        case 5: data.reviews_breakdown.five_star = item.count; break;
                                        case 4: data.reviews_breakdown.four_star = item.count; break;
                                        case 3: data.reviews_breakdown.three_star = item.count; break;
                                        case 2: data.reviews_breakdown.two_star = item.count; break;
                                        case 1: data.reviews_breakdown.one_star = item.count; break;
                                    }
                                }
                            }
                            
                            // Quality metrics from star_summary
                            if (gigData.reviews.star_summary) {
                                data.reviews_breakdown.seller_communication = gigData.reviews.star_summary.communication_valuation || 0;
                                data.reviews_breakdown.quality_of_delivery = gigData.reviews.star_summary.quality_of_delivery_valuation || 0;
                                data.reviews_breakdown.value_of_delivery = gigData.reviews.star_summary.value_for_money_valuation || 0;
                            }
                            
                            // Recent reviews from JSON
                            if (gigData.reviews.reviews) {
                                data.recent_reviews = gigData.reviews.reviews.slice(0, 10).map(r => ({
                                    buyer_name: r.username || '',
                                    buyer_country: r.reviewer_country || '',
                                    review_rating: String(r.value || ''),
