# PIA VPN FUNCTIONS
# ═══════════════════════════════════════════════════════════════════════════════

def pia_run_command(args):
    """Run a PIA command and return output."""
    try:
        if isinstance(args, str):
            args = [args]
        result = subprocess.run([PIA_PATH] + args, capture_output=True, text=True, timeout=15)
        return result.stdout.strip(), result.stderr.strip(), result.returncode
    except Exception as e:
        return "", str(e), -1

def pia_is_installed():
    """Check if PIA VPN is installed."""
    return os.path.exists(PIA_PATH)

def pia_get_connection_state():
    """Get current VPN connection state."""
    stdout, stderr, code = pia_run_command(["get", "connectionstate"])
    return stdout if code == 0 else "Unknown"

def pia_is_connected():
    """Check if PIA VPN is connected."""
    state = pia_get_connection_state()
    return state == "Connected"

def pia_is_logged_in():
    """Check if PIA is logged in by trying to get region."""
    stdout, stderr, code = pia_run_command(["get", "region"])
    # If we can get region, we're logged in
    # If not logged in, it returns error
    if code == 0 and stdout and "error" not in stdout.lower():
        return True
    # Also check if daemon is active
    state = pia_get_connection_state()
    if state != "Unknown" and "error" not in state.lower():
        return True
    return False

def pia_enable_background():
    """Enable background mode so VPN works without GUI."""
    stdout, stderr, code = pia_run_command(["background", "enable"])
    if code == 0:
        log("✅ PIA background mode enabled (VPN works without GUI)")
        return True
    else:
        log(f"⚠️ Could not enable background mode: {stderr}")
        return False

def pia_login():
    """Login to PIA using credentials from environment variables."""
    if not PIA_USERNAME or not PIA_PASSWORD:
        log("⚠️ PIA credentials not set in environment variables")
        log("   Set PIA_USERNAME and PIA_PASSWORD environment variables")
        return False
    
    log("🔐 Logging into PIA VPN...")
    
    # Create temporary credentials file
    import tempfile
    try:
        with tempfile.NamedTemporaryFile(mode='w', suffix='.txt', delete=False) as f:
            f.write(f"{PIA_USERNAME}\n{PIA_PASSWORD}\n")
            creds_file = f.name
        
        # Login using credentials file
        stdout, stderr, code = pia_run_command(["login", creds_file])
        
        # Delete credentials file immediately
        try:
            os.remove(creds_file)
        except:
            pass
        
        if code == 0:
            log("✅ PIA login successful!")
            return True
        else:
            log(f"❌ PIA login failed: {stderr}")
            return False
            
    except Exception as e:
        log(f"❌ PIA login error: {e}")
        return False

def pia_logout():
    """Logout from PIA."""
    stdout, stderr, code = pia_run_command(["logout"])
    return code == 0

def pia_disconnect():
    """Disconnect PIA VPN."""
    try:
        subprocess.run([PIA_PATH, "disconnect"], capture_output=True, timeout=10)
        time.sleep(2)
        return True
    except:
        return False

def pia_connect_random():
    """Connect PIA VPN to a random location."""
    global SESSION_VPN_LOCATION
    
    # Disconnect first if connected
    if pia_is_connected():
        log("🔌 Disconnecting current VPN...")
        pia_disconnect()
        time.sleep(2)
    
    # Pick random location
    location = random.choice(PIA_LOCATIONS)
    SESSION_VPN_LOCATION = location
    log(f"🌐 Connecting PIA VPN to: {location}")
    
    try:
        # Set region
        subprocess.run([PIA_PATH, "set", "region", location], capture_output=True, timeout=10)
        time.sleep(1)
        
        # Connect
        subprocess.run([PIA_PATH, "connect"], capture_output=True, timeout=10)
        
        # Wait for connection (max 30 seconds)
        for i in range(15):
            time.sleep(2)
            if pia_is_connected():
                log(f"✅ VPN connected to {location}")
                return True
            log(f"   ⏳ Waiting for VPN... ({i+1}/15)")
        
        log(f"❌ VPN connection timeout for {location}")
        return False
    except Exception as e:
        log(f"❌ VPN error: {e}")
        return False

def get_current_ip_info():
    """Get current IP address, city, country. Camoufox handles geo/locale via geoip=True."""
    global SESSION_IP, SESSION_CITY, SESSION_COUNTRY
    
    services = [
        ("http://ip-api.com/json/?fields=query,city,country,isp",
         lambda d: (d.get("query"), d.get("city", "Unknown"), d.get("country", "Unknown"), d.get("isp", ""))),
        ("https://ipapi.co/json/",
         lambda d: (d.get("ip"), d.get("city", "Unknown"), d.get("country_name", "Unknown"), d.get("org", ""))),
    ]
    
    for url, parse in services:
        try:
            r = requests.get(url, timeout=10)
            if r.status_code == 200:
                ip, city, country, isp = parse(r.json())
                SESSION_IP = ip
                SESSION_CITY = city
                SESSION_COUNTRY = country
                log(f"📍 IP: {SESSION_IP} | {SESSION_CITY}, {SESSION_COUNTRY} | ISP: {isp}")
                return True
        except Exception as e:
            log(f"   ⚠️ {url[:30]} failed: {e}")
            continue
    
    log("⚠️ Could not detect IP")
    SESSION_IP = "Unknown"
    SESSION_CITY = "Unknown"
    SESSION_COUNTRY = "Unknown"
    return False

def setup_vpn():
    """Setup VPN with random location and get IP info."""
    log("\n" + "="*70)
    log("🌐 SETTING UP VPN WITH RANDOM LOCATION")
    log("="*70)
    
    # Check if PIA is installed
    if not pia_is_installed():
        log(f"⚠️ PIA VPN not found at {PIA_PATH}")
        log("   Continuing without VPN...")
        get_current_ip_info()
        return False
    
    log("✅ PIA VPN found")
    
    # Check connection state
    state = pia_get_connection_state()
    log(f"   Current state: {state}")
    
    # Enable background mode (allows VPN without GUI running)
    pia_enable_background()
    
    # Check if logged in
    if not pia_is_logged_in():
        log("⚠️ PIA VPN is NOT logged in")
        
        # Try to auto-login using environment variables
        if PIA_USERNAME and PIA_PASSWORD:
            log("🔐 Attempting auto-login with credentials from environment...")
            if pia_login():
                log("✅ Auto-login successful!")
            else:
                log("❌ Auto-login failed!")
                log("   Continuing without VPN...")
                get_current_ip_info()
                return False
        else:
            log("❌ No PIA credentials available!")
            log("   Set environment variables: PIA_USERNAME, PIA_PASSWORD")
            log("   Or login manually: Open PIA GUI and login")
            log("")
            log("⚠️ Continuing without VPN...")
            get_current_ip_info()
            return False
    
    log("✅ PIA VPN is logged in")
    
    # Connect to random location
    if pia_connect_random():
        time.sleep(3)  # Wait for connection to stabilize
        get_current_ip_info()
        return True
    else:
        log("⚠️ VPN connection failed, continuing without VPN")
        get_current_ip_info()
        return False

