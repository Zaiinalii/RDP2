def load_keywords_from_fgos():
    """Load keywords from FGOS fleet API."""
    data, ok = fgos_api("GET", "keywords", params={"session_id": FGOS_SESSION_ID} if FGOS_SESSION_ID else None)
    if ok:
        # API returns {"keywords": [...]} when session exists, or flat list when no session
        if isinstance(data, list):
            keywords = data
        elif isinstance(data, dict):
            keywords = data.get("keywords", [])
        else:
            keywords = []
        if keywords:
            log(f"✅ Loaded {len(keywords)} keywords from FGOS")
            return keywords
    log("⚠️ No keywords from FGOS, using defaults")
    return DEFAULT_KEYWORDS

