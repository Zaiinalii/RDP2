name: Fiverr Scraper (NordVPN OpenVPN Debug)

on:
  workflow_dispatch:
    inputs:
      runner_role:
        description: 'Runner role'
        required: false
        default: 'scraper'
      preferred_country:
        description: 'Preferred VPN country'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DISPLAY: ":99"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ───────── DISPLAY ─────────
      - name: Start Virtual Display
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb xauth x11-utils
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "Display started"

      # ───────── PYTHON ─────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests certifi "camoufox[geoip]" browserforge
          python -m playwright install firefox
          python -m playwright install-deps firefox
          python -m camoufox fetch

      # ───────── VPN INSTALL ─────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn jq
          openvpn --version | head -1

      # ───────── DOWNLOAD CONFIG ─────────
      - name: Download NordVPN Config
        run: |
          COUNTRY="${{ github.event.inputs.preferred_country }}"
          if [ -z "$COUNTRY" ]; then
            COUNTRY="us"
          fi

          declare -A SERVERS
          SERVERS[us]="us7783"
          SERVERS[uk]="uk1009"
          SERVERS[ca]="ca173"
          SERVERS[de]="de206"

          SERVER="${SERVERS[$COUNTRY]:-us7783}"

          URL="https://downloads.nordcdn.com/configs/files/ovpn_udp/servers/${SERVER}.nordvpn.com.udp.ovpn"

          echo "Downloading config: $URL"
          curl -fSL "$URL" -o server.ovpn

          echo "Config preview:"
          head server.ovpn

      # ───────── AUTH FILE ─────────
      - name: Create VPN Auth File
        run: |
          echo "iUbZfFG7fUys9REFmQpqo3Vm" > auth.txt
          echo "suen4AmAMuu3HAKjD9RDpdqp" >> auth.txt
          chmod 600 auth.txt
          echo "Auth file created"

      # ───────── START VPN ─────────
      - name: Start OpenVPN
        run: |
          sudo modprobe tun || true

          sudo openvpn \
            --config server.ovpn \
            --auth-user-pass auth.txt \
            --auth-nocache \
            --route-nopull \
            --daemon \
            --log /tmp/openvpn.log

          echo "Waiting for VPN connection..."

          for i in {1..30}; do
            if grep -q "Initialization Sequence Completed" /tmp/openvpn.log; then
              echo "VPN CONNECTED"
              break
            fi

            if grep -q "AUTH_FAILED" /tmp/openvpn.log; then
              echo "VPN AUTH FAILED"
              cat /tmp/openvpn.log
              exit 1
            fi

            echo "Waiting $i"
            sleep 2
          done

          echo "VPN LOG:"
          sudo cat /tmp/openvpn.log || true

      # ───────── NETWORK DEBUG ─────────
      - name: Network Diagnostics
        run: |
          echo "Interfaces:"
          ip a

          echo "Routes:"
          ip route

          echo "Public IP:"
          curl -s http://ip-api.com/json | jq .

      # ───────── DOWNLOAD BOT ─────────
      - name: Download Mainbot.py
        run: |
          curl -fSL https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/Mainbot.py -o Mainbot.py
          ls -lh Mainbot.py

      # ───────── RUN SCRAPER ─────────
      - name: Run Scraper
        run: |
          touch /tmp/scraper.log

          python Mainbot.py > /tmp/scraper.log 2>&1 &
          BOT_PID=$!

          echo "Bot PID $BOT_PID"

          MINUTES=0

          while kill -0 "$BOT_PID" 2>/dev/null; do
            sleep 300
            MINUTES=$((MINUTES+5))
            echo "Heartbeat $MINUTES minutes"
            tail -3 /tmp/scraper.log || true
          done

          wait "$BOT_PID"
          EXIT_CODE=$?

          echo "Bot finished"
          tail -50 /tmp/scraper.log

          exit $EXIT_CODE

      # ───────── LOG UPLOAD ─────────
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: /tmp/scraper.log