name: Fiverr Scraper (6-Hour Bulletproof)

on:
  workflow_dispatch:
    inputs:
      runner_role:
        description: 'Runner role: scraper (Phase 1+2) or detail_only (Phase 2 only)'
        required: false
        default: 'scraper'
        type: choice
        options:
          - scraper
          - detail_only
      preferred_country:
        description: 'Preferred country code for VPN (empty = server decides)'
        required: false
        default: ''
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    env:
      DISPLAY: ":99"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── VIRTUAL DISPLAY ─────────────────────────────────────────
      - name: Start Virtual Display
        run: |
          echo "🖥️ Installing Xvfb..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb xauth
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "✅ Virtual display running on :99"

      # ─── PYTHON SETUP ────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests certifi "camoufox[geoip]" browserforge
          python -m playwright install firefox
          python -m playwright install-deps firefox
          python -m camoufox fetch
          echo "✅ All dependencies installed"

      # ─── OPENVPN SETUP (More reliable than PIA GUI) ──────────────
      - name: Install OpenVPN
        run: |
          echo "🌐 Installing OpenVPN..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq openvpn unzip curl
          echo "✅ OpenVPN installed: $(openvpn --version | head -1)"

      - name: Download PIA OpenVPN Configs
        run: |
          echo "📥 Downloading PIA OpenVPN configuration files..."
          
          # Create config directory
          sudo mkdir -p /etc/openvpn/pia
          cd /etc/openvpn/pia
          
          # Download PIA's official OpenVPN configs
          sudo curl -fSL "https://www.privateinternetaccess.com/openvpn/openvpn.zip" -o pia-configs.zip
          sudo unzip -o pia-configs.zip
          sudo rm pia-configs.zip
          
          # Create auth file with credentials
          echo "🔐 Setting up authentication..."
          sudo bash -c 'cat > /etc/openvpn/pia/auth.txt << EOF
p8158950
GoYoula@niba12$2323
EOF'
          sudo chmod 600 /etc/openvpn/pia/auth.txt
          
          # List available configs
          echo "✅ Available VPN regions:"
          ls -la /etc/openvpn/pia/*.ovpn | head -10
          echo "   ... and $(ls /etc/openvpn/pia/*.ovpn | wc -l) total regions"

      # ─── DOWNLOAD MAINBOT ────────────────────────────────────────
      - name: Download Mainbot.py from R2
        run: |
          curl -fSL "https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/Mainbot.py" -o Mainbot.py
          echo "✅ Downloaded Mainbot.py ($(stat -c%s Mainbot.py) bytes)"

      # ─── BULLETPROOF 6-HOUR RUNNER ───────────────────────────────
      - name: Run Scraper (6-Hour Bulletproof Loop)
        env:
          PIA_USERNAME: "p8158950"
          PIA_PASSWORD: "GoYoula@niba12$2323"
          FGOS_API_KEY: "fgos-scraper-key-2026-secure"
          RUNNER_ROLE: ${{ github.event.inputs.runner_role || 'scraper' }}
          PREFERRED_COUNTRY: ${{ github.event.inputs.preferred_country || '' }}
          VPN_MODE: "openvpn"
        run: |
          echo "=========================================="
          echo "  🚀 BULLETPROOF 6-HOUR SCRAPER (OpenVPN)"
          echo "=========================================="
          echo "  Started at: $(date)"
          echo "  Will run until: $(date -d '+6 hours')"
          echo "=========================================="
          
          # ─── CONSTANTS ───
          MAX_RUNTIME_SECONDS=$((6 * 60 * 60 - 300))  # 6 hours minus 5 min safety buffer
          START_TIME=$(date +%s)
          CRASH_COUNT=0
          TOTAL_RUNS=0
          LOG_FILE="/tmp/scraper.log"
          VPN_LOG="/tmp/openvpn.log"
          OVPN_DIR="/etc/openvpn/pia"
          
          # Available regions (PIA OpenVPN config file names without .ovpn)
          REGIONS=("us_california" "us_east" "us_west" "us_chicago" "us_texas" "us_florida" "us_atlanta" "uk_london" "de_berlin" "nl_amsterdam" "ca_toronto" "au_sydney")
          CURRENT_REGION=""
          
          # ─── VPN CONNECT FUNCTION (OpenVPN) ───
          connect_vpn() {
            local region="${1:-}"
            
            # If no region specified, pick based on preference or random
            if [ -z "$region" ]; then
              if [ -n "$PREFERRED_COUNTRY" ]; then
                # Map country code to PIA config name
                case "${PREFERRED_COUNTRY,,}" in
                  us|usa) region="us_california" ;;
                  uk|gb) region="uk_london" ;;
                  de) region="de_berlin" ;;
                  nl) region="nl_amsterdam" ;;
                  ca) region="ca_toronto" ;;
                  au) region="au_sydney" ;;
                  *) region="us_california" ;;
                esac
              else
                # Random region
                region="${REGIONS[$((RANDOM % ${#REGIONS[@]}))]}"
              fi
            fi
            
            CURRENT_REGION="$region"
            echo "🌐 [VPN] Connecting to: $region"
            
            # Kill any existing OpenVPN
            sudo killall openvpn 2>/dev/null || true
            sleep 2
            
            # Find the config file (try with and without spaces/underscores)
            OVPN_FILE=""
            for pattern in "$region" "${region//_/ }" "${region// /_}"; do
              for f in "$OVPN_DIR"/*"$pattern"*.ovpn "$OVPN_DIR"/"$pattern".ovpn; do
                if [ -f "$f" ]; then
                  OVPN_FILE="$f"
                  break 2
                fi
              done
            done
            
            if [ -z "$OVPN_FILE" ]; then
              echo "⚠️ [VPN] Config not found for $region, trying US California..."
              OVPN_FILE=$(ls "$OVPN_DIR"/*california*.ovpn 2>/dev/null | head -1)
              if [ -z "$OVPN_FILE" ]; then
                OVPN_FILE=$(ls "$OVPN_DIR"/*.ovpn 2>/dev/null | head -1)
              fi
            fi
            
            if [ -z "$OVPN_FILE" ]; then
              echo "❌ [VPN] No OpenVPN config files found!"
              return 1
            fi
            
            echo "   📄 Using config: $(basename "$OVPN_FILE")"
            
            # Start OpenVPN in background
            sudo openvpn --config "$OVPN_FILE" \
              --auth-user-pass "$OVPN_DIR/auth.txt" \
              --daemon --log "$VPN_LOG" \
              --connect-retry 3 --connect-timeout 30 \
              --script-security 2 \
              --verb 3
            
            # Wait for connection (check for tun0 interface)
            echo "   ⏳ Waiting for VPN connection..."
            for i in $(seq 1 15); do
              sleep 2
              if ip link show tun0 &>/dev/null; then
                # Get VPN IP
                VPN_IP=$(curl -s --max-time 5 ifconfig.me 2>/dev/null || curl -s --max-time 5 icanhazip.com 2>/dev/null || echo "unknown")
                echo "✅ [VPN] Connected! IP: $VPN_IP (region: $region)"
                return 0
              fi
            done
            
            echo "❌ [VPN] Connection timeout"
            echo "   📋 OpenVPN log:"
            tail -20 "$VPN_LOG" 2>/dev/null || true
            return 1
          }
          
          # ─── CHECK VPN FUNCTION ───
          check_vpn() {
            if ! ip link show tun0 &>/dev/null; then
              echo "⚠️ [VPN] Disconnected! Reconnecting..."
              connect_vpn "$CURRENT_REGION"
            fi
          }
          
          # ─── DISCONNECT VPN ───
          disconnect_vpn() {
            echo "🔌 [VPN] Disconnecting..."
            sudo killall openvpn 2>/dev/null || true
            sleep 2
          }
          
          # ─── Initial VPN connect ───
          connect_vpn
          
          # ─── MAIN LOOP — RUNS UNTIL 6 HOURS ───
          while true; do
            ELAPSED=$(($(date +%s) - START_TIME))
            REMAINING=$((MAX_RUNTIME_SECONDS - ELAPSED))
            
            # Check if time's up
            if [ $REMAINING -le 0 ]; then
              echo ""
              echo "=========================================="
              echo "  ⏰ 6-HOUR LIMIT REACHED — STOPPING"
              echo "=========================================="
              echo "  Total runs: $TOTAL_RUNS"
              echo "  Total crashes: $CRASH_COUNT"
              echo "=========================================="
              break
            fi
            
            # Show status
            TOTAL_RUNS=$((TOTAL_RUNS + 1))
            HOURS=$((ELAPSED / 3600))
            MINS=$(((ELAPSED % 3600) / 60))
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Run #$TOTAL_RUNS | Elapsed: ${HOURS}h ${MINS}m | Remaining: $((REMAINING / 60))m"
            echo "   Crashes so far: $CRASH_COUNT"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Check/reconnect VPN before each run
            check_vpn
            
            # ─── RUN MAINBOT ───
            echo "🚀 Starting Mainbot.py..."
            python Mainbot.py >> "$LOG_FILE" 2>&1 &
            BOT_PID=$!
            
            # ─── MONITOR BOT ───
            LAST_HEARTBEAT=$(date +%s)
            while kill -0 "$BOT_PID" 2>/dev/null; do
              sleep 60  # Check every minute
              
              NOW=$(date +%s)
              ELAPSED=$((NOW - START_TIME))
              
              # Check if 6-hour limit reached
              if [ $ELAPSED -ge $MAX_RUNTIME_SECONDS ]; then
                echo "⏰ Time limit — killing bot gracefully..."
                kill -TERM "$BOT_PID" 2>/dev/null || true
                sleep 5
                kill -9 "$BOT_PID" 2>/dev/null || true
                break 2  # Exit both loops
              fi
              
              # Heartbeat every 5 minutes
              if [ $((NOW - LAST_HEARTBEAT)) -ge 300 ]; then
                HOURS=$((ELAPSED / 3600))
                MINS=$(((ELAPSED % 3600) / 60))
                echo "💓 [${HOURS}h ${MINS}m] Bot running (PID $BOT_PID) | Crashes: $CRASH_COUNT"
                tail -1 "$LOG_FILE" 2>/dev/null | head -c 100 || true
                echo ""
                LAST_HEARTBEAT=$NOW
                
                # Check VPN still connected
                check_vpn
              fi
            done
            
            # ─── BOT EXITED — CHECK WHY ───
            wait "$BOT_PID" 2>/dev/null
            EXIT_CODE=$?
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Mainbot.py finished successfully (exit 0)"
              echo "   Will restart in 30s to continue scraping..."
              sleep 30
            else
              CRASH_COUNT=$((CRASH_COUNT + 1))
              echo "❌ Mainbot.py crashed! (exit code: $EXIT_CODE)"
              echo "   Crash #$CRASH_COUNT — will restart in 60s"
              echo ""
              echo "📋 Last 10 lines of log:"
              tail -10 "$LOG_FILE" 2>/dev/null || true
              echo ""
              
              # Rotate VPN on crash (might help avoid blocks)
              echo "🔄 Rotating VPN region..."
              disconnect_vpn
              
              # Pick different region if crashed
              NEW_REGION="${REGIONS[$((RANDOM % ${#REGIONS[@]}))]}"
              connect_vpn "$NEW_REGION"
              
              # Wait before restart
              sleep 60
            fi
            
            # Safety: if too many crashes in short time, slow down
            if [ $CRASH_COUNT -ge 10 ] && [ $((CRASH_COUNT % 10)) -eq 0 ]; then
              echo "⚠️ Many crashes detected — waiting 5 minutes before retry..."
              sleep 300
            fi
            
          done
          
          # ─── FINAL SUMMARY ───
          echo ""
          echo "=========================================="
          echo "  📊 FINAL SUMMARY"
          echo "=========================================="
          echo "  Total runtime: $((ELAPSED / 3600))h $(((ELAPSED % 3600) / 60))m"
          echo "  Total bot runs: $TOTAL_RUNS"
          echo "  Total crashes: $CRASH_COUNT"
          echo "=========================================="
          echo ""
          echo "📋 Last 100 lines of log:"
          tail -100 "$LOG_FILE" 2>/dev/null || true
          
          # Always exit 0 — we ran for 6 hours successfully
          exit 0

      # ─── UPLOAD LOG AS ARTIFACT ──────────────────────────────────
      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: /tmp/scraper.log
          retention-days: 7
