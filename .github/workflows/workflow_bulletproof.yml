name: Fiverr HTTP Scraper - PIA VPN (curl_cffi)

on:
  workflow_dispatch:
    inputs:
      preferred_country:
        description: "PIA VPN region (e.g. us_california, us_east, uk_london, de_berlin)"
        required: false
        default: "us_california"
      fetch_gig_pages:
        description: "Quick View in Phase 1 (true=slow+full data, false=fast)"
        required: false
        default: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      VPN_ENABLED: "1"
      SKIP_PHASE2: "false"
      RUNNER_ROLE: "scraper"
      PREFERRED_COUNTRY: ${{ github.event.inputs.preferred_country }}
      FETCH_GIG_PAGES: ${{ github.event.inputs.fetch_gig_pages }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ───────── PYTHON ─────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install curl_cffi requests certifi

      # ───────── OPENVPN + DEPS ─────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openvpn jq
          openvpn --version | head -1

      # ───────── PIA CONNECT VIA API ─────────
      - name: Connect PIA VPN
        run: |
          sudo modprobe tun || true

          PIA_USER="p8158950"
          PIA_PASS='GoYoula@niba12$2323'
          REGION="${{ github.event.inputs.preferred_country }}"

          # Step 1: Get auth token
          echo "Getting PIA auth token..."
          TOKEN_RESPONSE=$(curl -s -u "$PIA_USER:$PIA_PASS" \
            "https://privateinternetaccess.com/gtoken/generateToken")
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "AUTH FAILED - check PIA credentials"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi
          echo "Got PIA token (${#TOKEN} chars)"

          # Step 2: Get server list
          echo "Fetching PIA server list..."
          SERVERS=$(curl -s "https://serverlist.piaservers.net/vpninfo/servers/v6")
          SERVERS_JSON=$(echo "$SERVERS" | head -1)

          # Step 3: Pick server by preferred region or lowest latency US
          echo "Looking for region: $REGION"
          SERVER_IP=$(echo "$SERVERS_JSON" | jq -r \
            --arg region "$REGION" \
            '.regions[] | select(.id == $region) | .servers.ovpnudp[0].ip' 2>/dev/null)
          SERVER_CN=$(echo "$SERVERS_JSON" | jq -r \
            --arg region "$REGION" \
            '.regions[] | select(.id == $region) | .servers.ovpnudp[0].cn' 2>/dev/null)

          if [ -z "$SERVER_IP" ] || [ "$SERVER_IP" = "null" ]; then
            echo "Region '$REGION' not found, picking random US server..."
            PICK=$(echo "$SERVERS_JSON" | jq -r \
              '[.regions[] | select(.id | startswith("us")) | {id: .id, ip: .servers.ovpnudp[0].ip, cn: .servers.ovpnudp[0].cn}] | .[0]')
            SERVER_IP=$(echo "$PICK" | jq -r '.ip')
            SERVER_CN=$(echo "$PICK" | jq -r '.cn')
            echo "Using fallback US server: $SERVER_IP ($SERVER_CN)"
          else
            echo "Using region '$REGION': $SERVER_IP ($SERVER_CN)"
          fi

          # Step 4: Create OpenVPN config dynamically
          echo "Creating OpenVPN config..."
          sudo mkdir -p /etc/openvpn/pia

          # Download correct CA cert for standard encryption (port 1198)
          curl -s "https://raw.githubusercontent.com/pia-foss/manual-connections/master/ca.rsa.2048.crt" -o /tmp/pia-ca.crt
          if [ ! -s /tmp/pia-ca.crt ]; then
            echo "Failed to download CA cert, trying alternate URL..."
            curl -s "https://raw.githubusercontent.com/pia-foss/manual-connections/refs/heads/master/ca.rsa.2048.crt" -o /tmp/pia-ca.crt
          fi
          echo "CA cert size: $(wc -c < /tmp/pia-ca.crt) bytes"

          sudo bash -c "cat > /etc/openvpn/pia/pia.ovpn" <<OVPNEOF
          client
          dev tun
          proto udp
          remote ${SERVER_IP} 1198
          resolv-retry infinite
          nobind
          persist-key
          persist-tun
          cipher aes-128-gcm
          auth sha256
          tls-client
          remote-cert-tls server
          auth-user-pass /etc/openvpn/auth.txt
          verb 3
          reneg-sec 0
          verify-x509-name ${SERVER_CN} name
          <ca>
          $(cat /tmp/pia-ca.crt)
          </ca>
          OVPNEOF

          echo "Config written. Checking..."
          sudo head -5 /etc/openvpn/pia/pia.ovpn
          sudo grep -c "BEGIN CERTIFICATE" /etc/openvpn/pia/pia.ovpn

          # Step 5: Create auth file
          echo "$PIA_USER" | sudo tee /etc/openvpn/auth.txt > /dev/null
          echo "$PIA_PASS" | sudo tee -a /etc/openvpn/auth.txt > /dev/null
          sudo chmod 600 /etc/openvpn/auth.txt

          # Set env vars for Python VPN rotation
          echo "OPENVPN_CONFIG_DIR=/etc/openvpn/pia" >> $GITHUB_ENV
          echo "OPENVPN_AUTH_FILE=/etc/openvpn/auth.txt" >> $GITHUB_ENV
          echo "PIA_SERVERS_JSON<<EOFSERVERS" >> $GITHUB_ENV
          echo "$SERVERS_JSON" | jq -c '[.regions[] | {id: .id, ip: .servers.ovpnudp[0].ip, cn: .servers.ovpnudp[0].cn}]' >> $GITHUB_ENV
          echo "EOFSERVERS" >> $GITHUB_ENV

          # Step 6: Connect
          sudo openvpn \
            --config /etc/openvpn/pia/pia.ovpn \
            --auth-nocache \
            --daemon \
            --log /tmp/openvpn.log

          echo "Waiting for PIA VPN connection..."
          for i in $(seq 1 30); do
            if sudo grep -q "Initialization Sequence Completed" /tmp/openvpn.log; then
              echo "PIA VPN CONNECTED"
              break
            fi
            if sudo grep -q "AUTH_FAILED" /tmp/openvpn.log; then
              echo "PIA VPN AUTH FAILED"
              sudo cat /tmp/openvpn.log
              exit 1
            fi
            echo "Waiting $i"
            sleep 2
          done

          if ! sudo grep -q "Initialization Sequence Completed" /tmp/openvpn.log; then
            echo "PIA VPN connection timed out"
            sudo cat /tmp/openvpn.log
            exit 1
          fi

      # ───────── VERIFY IP ─────────
      - name: Verify VPN IP
        run: |
          echo "Checking IP..."

          IP_INFO=$(curl -s http://ip-api.com/json)

          echo "$IP_INFO" | jq .

          ISP=$(echo "$IP_INFO" | jq -r '.isp')

          if echo "$ISP" | grep -qi "microsoft"; then
            echo "Still using GitHub runner IP (Azure)"
            exit 1
          else
            echo "PIA VPN active (non-Azure IP)"
          fi

      # ───────── DOWNLOAD BOT ─────────
      - name: Download Mainbot_http.py
        run: |
          curl -fSL https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/Mainbot_http.py -o Mainbot_http.py
          ls -lh Mainbot_http.py

      # ───────── RUN SCRAPER ─────────
      - name: Run Scraper
        run: |
          echo "Starting HTTP scraper (Phase 1 + Phase 2)..."
          echo "   Quick View: $FETCH_GIG_PAGES"
          echo "   PIA Region: $PREFERRED_COUNTRY"
          echo "============================================="
          
          python -u Mainbot_http.py 2>&1 | tee /tmp/scraper.log

      # ───────── UPLOAD LOG ─────────
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-scraper-pia-log-${{ github.run_id }}
          path: /tmp/scraper.log
          retention-days: 7
