name: Fiverr Scraper (NordVPN OpenVPN)

on:
  workflow_dispatch:
    inputs:
      runner_role:
        description: "Runner role"
        required: false
        default: "scraper"
      preferred_country:
        description: "Preferred VPN country"
        required: false
        default: "us"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DISPLAY: ":99"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ───────── DISPLAY ─────────
      - name: Start Virtual Display
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb xauth x11-utils
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "Virtual display started"

      # ───────── PYTHON ─────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests certifi "camoufox[geoip]" browserforge
          python -m playwright install firefox
          python -m playwright install-deps firefox
          python -m camoufox fetch

      # ───────── OPENVPN ─────────
      - name: Install OpenVPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openvpn jq
          openvpn --version | head -1

      # ───────── GET SERVER ─────────
      - name: Fetch NordVPN Server
        run: |
          echo "Fetching recommended NordVPN server..."

          SERVER=$(curl -s https://api.nordvpn.com/v1/servers/recommendations | jq -r '.[0].hostname')

          if [ -z "$SERVER" ]; then
            echo "Failed to fetch NordVPN server"
            exit 1
          fi

          echo "Recommended server: $SERVER"

          CONFIG_URL="https://downloads.nordcdn.com/configs/files/ovpn_udp/servers/${SERVER}.udp.ovpn"

          echo "Downloading config: $CONFIG_URL"

          curl -fSL "$CONFIG_URL" -o server.ovpn

          if [ ! -f server.ovpn ]; then
            echo "VPN config download failed"
            exit 1
          fi

      # ───────── AUTH FILE ─────────
      - name: Create NordVPN Auth File
        run: |
          echo "iUbZfFG7fUys9REFmQpqo3Vm" > auth.txt
          echo "suen4AmAMuu3HAKjD9RDpdqp" >> auth.txt
          chmod 600 auth.txt
          echo "Auth file created"

      # ───────── CONNECT VPN ─────────
      - name: Connect VPN
        run: |
          sudo modprobe tun || true

          sudo openvpn \
            --config server.ovpn \
            --auth-user-pass auth.txt \
            --auth-nocache \
            --daemon \
            --log /tmp/openvpn.log

          echo "Waiting for VPN..."

          for i in $(seq 1 30); do

            if sudo grep -q "Initialization Sequence Completed" /tmp/openvpn.log; then
              echo "VPN CONNECTED"
              break
            fi

            if sudo grep -q "AUTH_FAILED" /tmp/openvpn.log; then
              echo "VPN AUTH FAILED"
              sudo cat /tmp/openvpn.log
              exit 1
            fi

            echo "Waiting $i"
            sleep 2
          done

          echo "VPN LOG:"
          sudo cat /tmp/openvpn.log || true

      # ───────── VERIFY IP ─────────
      - name: Verify VPN IP
        run: |
          echo "Checking IP..."

          IP_INFO=$(curl -s http://ip-api.com/json)

          echo "$IP_INFO" | jq .

          ISP=$(echo "$IP_INFO" | jq -r '.isp')

          if echo "$ISP" | grep -qi "microsoft"; then
            echo "Still using GitHub runner IP (Azure)"
            exit 1
          else
            echo "VPN active (non-Azure IP)"
          fi

      # ───────── DOWNLOAD BOT ─────────
      - name: Download Mainbot.py
        run: |
          curl -fSL https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/Mainbot.py -o Mainbot.py
          ls -lh Mainbot.py

      # ───────── RUN SCRAPER ─────────
      - name: Run Scraper
        run: |
          echo "🚀 Starting scraper with FULL REAL-TIME LOGS..."
          echo "═══════════════════════════════════════════════"
          
          # Run with unbuffered output (-u) so logs appear immediately
          python -u Mainbot.py 2>&1 | tee /tmp/scraper.log

      # ───────── UPLOAD LOG ─────────
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: /tmp/scraper.log
          retention-days: 7