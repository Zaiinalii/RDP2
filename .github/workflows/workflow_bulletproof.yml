          # Add remote line with selected server
          sudo sed -i "/^client/a remote ${SERVER_IP} 8080 udp" /etc/openvpn/pia/pia.ovpn
          # Strip leading whitespace from heredoc
          sudo sed -i 's/^          //' /etc/openvpn/pia/pia.ovpn

          echo "Config written. Verifying..."
          sudo grep "remote " /etc/openvpn/pia/pia.ovpn
          sudo grep -c "BEGIN CERTIFICATE" /etc/openvpn/pia/pia.ovpn

          # Set env vars for Python VPN rotation
          echo "OPENVPN_CONFIG_DIR=/etc/openvpn/pia" >> $GITHUB_ENV
          echo "OPENVPN_AUTH_FILE=/opt/piavpn-manual/credentials" >> $GITHUB_ENV
          echo "PIA_TOKEN=$TOKEN" >> $GITHUB_ENV

          # Step 6: Connect
          sudo openvpn \
            --config /etc/openvpn/pia/pia.ovpn \
            --daemon \
            --log /tmp/openvpn.log

          echo "Waiting for PIA VPN connection..."
          for i in $(seq 1 30); do
            if sudo grep -q "Initialization Sequence Completed" /tmp/openvpn.log; then
              echo "PIA VPN CONNECTED"
              break
            fi
            if sudo grep -q "AUTH_FAILED" /tmp/openvpn.log; then
              echo "PIA VPN AUTH FAILED"
              sudo cat /tmp/openvpn.log
              exit 1
            fi
            echo "Waiting $i"
            sleep 2
          done

          if ! sudo grep -q "Initialization Sequence Completed" /tmp/openvpn.log; then
            echo "PIA VPN connection timed out"
            sudo cat /tmp/openvpn.log
            exit 1
          fi

      # ───────── VERIFY IP ─────────
      - name: Verify VPN IP
        run: |
          echo "Checking IP..."

          IP_INFO=$(curl -s http://ip-api.com/json)

          echo "$IP_INFO" | jq .

          ISP=$(echo "$IP_INFO" | jq -r '.isp')

          if echo "$ISP" | grep -qi "microsoft"; then
            echo "Still using GitHub runner IP (Azure)"
            exit 1
          else
            echo "PIA VPN active (non-Azure IP)"
          fi

      # ───────── DOWNLOAD BOT ─────────
      - name: Download Mainbot_http.py
        run: |
          curl -fSL https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/Mainbot_http.py -o Mainbot_http.py
          ls -lh Mainbot_http.py

      # ───────── RUN SCRAPER ─────────
      - name: Run Scraper
        run: |
          echo "Starting HTTP scraper (Phase 1 + Phase 2)..."
          echo "   Quick View: $FETCH_GIG_PAGES"
          echo "   PIA Region: $PREFERRED_COUNTRY"
          echo "============================================="
          
          python -u Mainbot_http.py 2>&1 | tee /tmp/scraper.log

      # ───────── UPLOAD LOG ─────────
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-scraper-pia-log-${{ github.run_id }}
          path: /tmp/scraper.log
          retention-days: 7
