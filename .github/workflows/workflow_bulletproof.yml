name: Fiverr Scraper (Direct + NordVPN Token)

on:
  workflow_dispatch:
    inputs:
      runner_role:
        description: 'Runner role: scraper (Phase 1+2) or detail_only (Phase 2 only)'
        required: false
        default: 'scraper'
        type: choice
        options:
          - scraper
          - detail_only
      preferred_country:
        description: 'Preferred country code for VPN (empty = server decides)'
        required: false
        default: ''
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    env:
      DISPLAY: ":99"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─── VIRTUAL DISPLAY ─────────────────────────────────────────
      - name: Start Virtual Display
        run: |
          echo "🖥️ Installing Xvfb..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb xauth
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "✅ Virtual display running on :99"

      # ─── PYTHON SETUP ────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests certifi "camoufox[geoip]" browserforge
          python -m playwright install firefox
          python -m playwright install-deps firefox
          python -m camoufox fetch
          echo "✅ All dependencies installed"

      # ─── NORDVPN VPN SETUP ──────────────────────────────────────
      - name: Install NordVPN
        run: |
          echo "🌐 Setting up NordVPN repository..."
          
          # Add NordVPN GPG key
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys 63C4A4AB97344D65 2>/dev/null || true
          
          # Add NordVPN repository
          sudo sh -c 'echo "deb https://repo.nordvpn.com/deb/nordvpn/debian stable main" > /etc/apt/sources.list.d/nordvpn.list'
          
          echo "📦 Updating package list..."
          sudo apt-get update -qq 2>&1 | tail -5
          
          echo "🌐 Installing NordVPN..."
          sudo apt-get install -y -qq nordvpn
          
          echo "✅ NordVPN installed"
          nordvpn --version || true
          
          # Wait for daemon to start
          echo "⏳ Waiting for NordVPN daemon..."
          for i in $(seq 1 15); do
            sleep 2
            if sudo systemctl is-active --quiet nordvpn 2>/dev/null; then
              echo "✅ NordVPN daemon is running"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "⚠️ Daemon not auto-started, starting manually..."
              sudo systemctl start nordvpn || sudo /usr/sbin/nordvpnd || true
              sleep 3
            fi
            echo "   ⏳ Attempt $i/15..."
          done

      - name: Login NordVPN
        run: |
          echo "🔐 Logging into NordVPN with token..."
          
          # Retry login up to 3 times
          for attempt in 1 2 3; do
            if nordvpn login --token "e9f2abf0e76371b2b0b9f258ba6cab4ef06267863cbe3f992f4bffd1d20da729" 2>/dev/null; then
              echo "✅ NordVPN logged in (attempt $attempt)"
              break
            fi
            echo "   ⚠️ Login attempt $attempt failed, retrying..."
            sleep 5
          done
          
          # Enable autoconnect for reliability
          sudo nordvpn set autoconnect on 2>/dev/null || true
          
          echo "✅ NordVPN ready. VPC connect handled by Mainbot.py"

      # ─── VERIFY VPN CONNECTION ──────────────────────────────────
      - name: Verify NordVPN Connected
        run: |
          echo "🔍 Verifying VPN connection..."
          
          # Check status
          for i in {1..15}; do
            if nordvpn status | grep -q "connected"; then
              echo "✅ VPN is connected!"
              nordvpn status
              break
            fi
            if [ $i -eq 15 ]; then
              echo "❌ VPN failed to connect after 30s"
              exit 1
            fi
            echo "   ⏳ Waiting... ($i/15)"
            sleep 2
          done
          
          # Check IP info
          echo ""
          echo "📍 IP Information:"
          curl -s http://ip-api.com/json/ | jq '.country, .city, .isp' 2>/dev/null || curl -s http://ip-api.com/json/

      # ─── RUN THE SCRAPER ─────────────────────────────────────────
      - name: Download Mainbot.py from R2
        run: |
          curl -fSL "https://pub-4e3db5ccea8a4f30ae7d4ee15e71f566.r2.dev/Mainbot.py" -o Mainbot.py
          
          if [ ! -f Mainbot.py ]; then
            echo "❌ Failed to download Mainbot.py"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s Mainbot.py 2>/dev/null || stat -f%z Mainbot.py 2>/dev/null)
          if [ "$FILE_SIZE" -lt 10000 ]; then
            echo "❌ Downloaded file too small ($FILE_SIZE bytes) - likely failed"
            head -20 Mainbot.py
            exit 1
          fi
          
          echo "✅ Downloaded Mainbot.py ($FILE_SIZE bytes)"
          ls -lah Mainbot.py

      - name: Run Scraper (background + watchdog)
        env:
          NORDVPN_TOKEN: "e9f2abf0e76371b2b0b9f258ba6cab4ef06267863cbe3f992f4bffd1d20da729"
          FGOS_API_KEY: "fgos-scraper-key-2026-secure"
          RUNNER_ROLE: ${{ github.event.inputs.runner_role || 'scraper' }}
          PREFERRED_COUNTRY: ${{ github.event.inputs.preferred_country || '' }}
        run: |
          echo "=========================================="
          echo "  🚀 Starting Fiverr Scraper (Background)"
          echo "=========================================="
          echo ""
          echo "📋 Python version:"
          python --version
          echo ""
          echo "📋 Mainbot.py info:"
          ls -lah Mainbot.py
          echo ""
          
          # Create log file early so it exists even if script fails immediately
          touch /tmp/scraper.log
          
          # ── Launch Mainbot.py in background, log to file ──
          python Mainbot.py > /tmp/scraper.log 2>&1 &
          BOT_PID=$!
          echo "✅ Mainbot.py started (PID: $BOT_PID)"
          echo "   Logs → /tmp/scraper.log"
          echo ""
          
          # ── Watchdog: keep runner alive while bot runs ──
          # Prints a heartbeat every 5 min so GitHub doesn't kill for inactivity
          # Exits when Mainbot.py finishes (success or crash)
          MINUTES=0
          while kill -0 "$BOT_PID" 2>/dev/null; do
            sleep 300
            MINUTES=$((MINUTES + 5))
            
            # Print heartbeat (prevents GitHub 10-min no-output timeout)
            echo "💓 [$MINUTES min] Scraper still running (PID $BOT_PID)"
            
            # Show last 3 lines of log for quick status
            echo "   📄 Recent logs:"
            tail -3 /tmp/scraper.log 2>/dev/null || echo "   (no logs yet)"
            echo ""
          done
          
          # ── Bot finished — get exit code ──
          wait "$BOT_PID"
          EXIT_CODE=$?
          
          echo ""
          echo "=========================================="
          echo "  🏁 Scraper finished (exit code: $EXIT_CODE)"
          echo "=========================================="
          echo ""
          
          # Show log if it exists
          if [ -f /tmp/scraper.log ]; then
            echo "📋 Last 100 lines of log:"
            tail -100 /tmp/scraper.log
          else
            echo "❌ No log file found at /tmp/scraper.log"
          fi
          
          exit $EXIT_CODE

      # ─── UPLOAD LOG AS ARTIFACT (always, even on failure) ────────
      - name: Check log file before upload
        if: always()
        run: |
          echo "📋 Checking log file..."
          if [ -f /tmp/scraper.log ]; then
            echo "✅ Log file exists"
            ls -lah /tmp/scraper.log
            echo "📊 File size: $(stat -c%s /tmp/scraper.log 2>/dev/null || stat -f%z /tmp/scraper.log) bytes"
          else
            echo "❌ Log file not found - creating empty one"
            mkdir -p /tmp
            echo "No log file was created by the scraper" > /tmp/scraper.log
          fi

      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: /tmp/scraper.log
          retention-days: 7
